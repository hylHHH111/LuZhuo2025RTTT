<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>鹭卓2025 RTTT巡演</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            /* 新配色方案 - 高级感蓝色系 */
            --primary: #42abf3;
            --primary-light: #6ec0f8;
            --primary-lighter: #a2d7fc;
            --primary-lightest: #cdecff;
            --primary-bg: #e4f5fd;
            --white: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a5568;

            /* 兼容旧变量名 */
            --warm-cream: #e4f5fd;
            --warm-peach: #a2d7fc;
            --warm-coral: #42abf3;
            --warm-pink: #6ec0f8;
            --warm-brown: #1a1a2e;
            --warm-gold: #6ec0f8;
            --warm-mint: #a2d7fc;
            --warm-lavender: #e4f5fd;
            --paper-texture: rgba(255, 255, 255, 0.98);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(180deg, var(--primary-lighter) 0%, var(--primary-bg) 50%, var(--white) 100%);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* 纸质纹理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        /* 温暖的光晕效果 */
        .warm-glow {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(60px);
            animation: floatGlow 10s ease-in-out infinite;
        }

        .warm-glow-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(66, 171, 243, 0.3) 0%, transparent 70%);
            top: -150px;
            right: -100px;
            animation-delay: 0s;
        }

        .warm-glow-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(162, 215, 252, 0.35) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation-delay: -5s;
        }

        .warm-glow-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.6) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -2s;
        }

        @keyframes floatGlow {
            0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.6; }
            33% { transform: scale(1.1) translate(20px, -20px); opacity: 0.8; }
            66% { transform: scale(0.95) translate(-10px, 15px); opacity: 0.7; }
        }

        /* 手绘风格装饰元素 */
        .hand-drawn-element {
            position: fixed;
            pointer-events: none;
            z-index: 1;
        }

        /* 闪闪小圆点 */
        .sparkle-dot {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            animation: sparkle 1.9s ease-in-out infinite;
        }

        .sparkle-1 { width: 2px; height: 2px; background: #FFFFFF; top: 5%; left: 5%; animation-delay: 0s; }
        .sparkle-2 { width: 1px; height: 1px; background: #FFFFFF; top: 12%; left: 18%; animation-delay: 0.23s; }
        .sparkle-3 { width: 2px; height: 2px; background: #FFFFFF; top: 8%; left: 35%; animation-delay: 0.47s; }
        .sparkle-4 { width: 1px; height: 1px; background: #FFFFFF; top: 15%; left: 52%; animation-delay: 0.71s; }
        .sparkle-5 { width: 2px; height: 2px; background: #FFFFFF; top: 6%; left: 68%; animation-delay: 0.95s; }
        .sparkle-6 { width: 1px; height: 1px; background: #FFFFFF; top: 14%; left: 82%; animation-delay: 1.19s; }
        .sparkle-7 { width: 2px; height: 2px; background: #FFFFFF; top: 3%; left: 92%; animation-delay: 1.43s; }
        .sparkle-8 { width: 1px; height: 1px; background: #FFFFFF; top: 18%; left: 45%; animation-delay: 1.67s; }
        .sparkle-9 { width: 2px; height: 2px; background: #FFFFFF; top: 22%; left: 8%; animation-delay: 0.08s; }
        .sparkle-10 { width: 1px; height: 1px; background: #FFFFFF; top: 28%; left: 25%; animation-delay: 0.31s; }
        .sparkle-11 { width: 2px; height: 2px; background: #FFFFFF; top: 25%; left: 42%; animation-delay: 0.55s; }
        .sparkle-12 { width: 1px; height: 1px; background: #FFFFFF; top: 32%; left: 58%; animation-delay: 0.79s; }
        .sparkle-13 { width: 2px; height: 2px; background: #FFFFFF; top: 20%; left: 75%; animation-delay: 1.03s; }
        .sparkle-14 { width: 1px; height: 1px; background: #FFFFFF; top: 30%; left: 88%; animation-delay: 1.27s; }
        .sparkle-15 { width: 2px; height: 2px; background: #FFFFFF; top: 35%; left: 12%; animation-delay: 1.51s; }
        .sparkle-16 { width: 1px; height: 1px; background: #FFFFFF; top: 38%; left: 30%; animation-delay: 1.75s; }
        .sparkle-17 { width: 2px; height: 2px; background: #FFFFFF; top: 42%; left: 48%; animation-delay: 0.13s; }
        .sparkle-18 { width: 1px; height: 1px; background: #FFFFFF; top: 36%; left: 65%; animation-delay: 0.37s; }
        .sparkle-19 { width: 2px; height: 2px; background: #FFFFFF; top: 45%; left: 80%; animation-delay: 0.61s; }
        .sparkle-20 { width: 1px; height: 1px; background: #FFFFFF; top: 40%; left: 95%; animation-delay: 0.85s; }
        .sparkle-21 { width: 2px; height: 2px; background: #FFFFFF; top: 48%; left: 5%; animation-delay: 1.09s; }
        .sparkle-22 { width: 1px; height: 1px; background: #FFFFFF; top: 52%; left: 20%; animation-delay: 1.33s; }
        .sparkle-23 { width: 2px; height: 2px; background: #FFFFFF; top: 55%; left: 38%; animation-delay: 1.57s; }
        .sparkle-24 { width: 1px; height: 1px; background: #FFFFFF; top: 50%; left: 55%; animation-delay: 1.81s; }
        .sparkle-25 { width: 2px; height: 2px; background: #FFFFFF; top: 58%; left: 72%; animation-delay: 0.19s; }
        .sparkle-26 { width: 1px; height: 1px; background: #FFFFFF; top: 54%; left: 88%; animation-delay: 0.43s; }
        .sparkle-27 { width: 2px; height: 2px; background: #FFFFFF; top: 62%; left: 15%; animation-delay: 0.67s; }
        .sparkle-28 { width: 1px; height: 1px; background: #FFFFFF; top: 68%; left: 32%; animation-delay: 0.91s; }
        .sparkle-29 { width: 1px; height: 1px; background: #FFFFFF; top: 65%; left: 50%; animation-delay: 1.15s; }
        .sparkle-30 { width: 2px; height: 2px; background: #FFFFFF; top: 72%; left: 68%; animation-delay: 1.39s; }

        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 15px 3px rgba(255, 255, 255, 0.9), 0 0 30px 6px rgba(66, 171, 243, 0.4); }
        }

        /* 3D场景容器 */
        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 1200px;
            z-index: 2;
        }

        /* 2D滑动容器 */
        #carousel {
            position: absolute;
            top: 58%;
            left: 50%;
            width: 0;
            height: 0;
            transform-style: flat;
            transition: transform 0.3s ease-out;
            will-change: transform;
        }

        /* 手绘风格卡片 */
        .card {
            position: absolute;
            width: 150px;
            height: 205px;
            left: -75px;
            top: -102px;
            background: transparent;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(66, 171, 243, 0.15);
            overflow: visible;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
            pointer-events: auto;
            will-change: transform;
            backface-visibility: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .card:hover {
            box-shadow: 0 8px 30px rgba(66, 171, 243, 0.35);
            z-index: 1000 !important;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.3s ease;
            will-change: transform;
            display: block;
            background: transparent;
        }

        .card-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--warm-peach) 0%, var(--warm-pink) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--warm-brown);
            font-size: 14px;
            font-weight: 500;
            font-family: 'Noto Sans SC', sans-serif;
            border-radius: 10px;
        }

        /* 中央按钮 - 手绘风格 */
        #center-btn {
            position: absolute;
            top: 0%;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 45px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 48px;
            font-weight: 500;
            font-family: 'Noto Serif SC', serif;
            text-align: center;
            cursor: pointer;
            box-shadow: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 50;
            white-space: nowrap;
            overflow: hidden;
            letter-spacing: 4px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-touch-callout: none;
        }

        #center-btn:hover {
            transform: translateX(-50%) scale(1.05);
            color: var(--primary-light);
        }

        #center-btn:active {
            transform: translateX(-50%) scale(0.98);
        }

        #center-btn.clicked {
            animation: btnDisappear 0.8s ease forwards;
        }

        @keyframes btnDisappear {
            0% { transform: translateX(-50%) scale(1); opacity: 1; }
            50% { transform: translateX(-50%) scale(1.15); opacity: 0.6; }
            100% { transform: translateX(-50%) scale(0); opacity: 0; }
        }

        /* 副标题文字 */
        #subtitle-text {
            position: absolute;
            top: calc(0% + 90px);
            left: 50%;
            transform: translateX(-50%);
            color: var(--primary);
            font-size: 14px;
            font-weight: 400;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 3px;
            text-align: center;
            z-index: 50;
            opacity: 1;
        }

        /* 过渡动画 */
        .fade-out {
            animation: fadeOut 1s ease forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        .card.scatter {
            animation: scatter 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes scatter {
            to {
                transform: translateZ(800px) rotateY(540deg) rotateX(45deg) scale(0);
                opacity: 0;
            }
        }

        /* 图片放大查看 */
        #image-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, var(--primary-lighter) 0%, var(--primary-bg) 50%, var(--white) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        #image-viewer.active {
            opacity: 1;
            visibility: visible;
        }

        #image-viewer .viewer-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 75%;
            max-height: 75%;
        }

        #image-viewer img {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 16px;
            box-shadow:
                0 20px 60px rgba(66, 171, 243, 0.2),
                0 0 0 4px rgba(66, 171, 243, 0.25);
        }

        #image-viewer .viewer-date {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: var(--primary);
            font-family: 'Noto Sans SC', sans-serif;
            white-space: nowrap;
        }

        #image-viewer .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            background: var(--paper-texture);
            border: 3px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 3px 3px 0 rgba(66, 171, 243, 0.25);
            font-weight: 300;
            z-index: 10;
        }

        #image-viewer .close-btn:hover {
            transform: scale(1.1) rotate(90deg);
            background: var(--primary);
            color: white;
        }

        #image-viewer .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(66, 171, 243, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        #image-viewer .nav-btn:hover {
            background: rgba(66, 171, 243, 0.9);
            color: white;
            transform: translateY(-50%) scale(1.1);
        }

        #image-viewer .nav-btn.prev {
            left: -80px;
        }

        #image-viewer .nav-btn.next {
            right: -80px;
        }

        /* 加载动画 - 简约风格 */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, var(--primary-lighter) 0%, var(--primary-bg) 50%, var(--white) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            transition: opacity 0.5s ease;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
            animation: fadeInUp 0.8s ease forwards;
        }

        .loader-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 48px;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: 8px;
            margin-bottom: 12px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.2s forwards;
        }

        .loader-subtitle {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 16px;
            font-weight: 400;
            color: var(--primary-light);
            letter-spacing: 4px;
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.4s forwards;
        }

        .loader-line {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-light), transparent);
            margin: 0 auto 24px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.6s forwards, lineShimmer 0.7s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .loader-line::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: shimmer 0.7s ease-in-out infinite;
        }

        @keyframes lineShimmer {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .loader-text {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: var(--primary-lighter);
            letter-spacing: 6px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.8s forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 标题文字 */
        .main-title {
            position: absolute;
            top: 22%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            #center-btn {
                font-size: 32px;
                padding: 12px 30px;
                white-space: nowrap;
            }

            #subtitle-text {
                font-size: 12px;
                letter-spacing: 2px;
                white-space: nowrap;
                top: calc(0% + 70px);
            }

            .loader-title {
                font-size: 36px;
            }

            .loader-subtitle {
                font-size: 14px;
            }

            .card {
                width: 110px;
                height: 150px;
                left: -55px;
                top: -75px;
            }

            #image-viewer .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            #image-viewer .nav-btn.prev {
                left: 10px;
            }

            #image-viewer .nav-btn.next {
                right: 10px;
            }

            #music-control-btn {
                width: 40px !important;
                height: 40px !important;
                font-size: 18px !important;
                bottom: 20px !important;
                right: 20px !important;
            }
        }

        @media (max-width: 480px) {
            #center-btn {
                font-size: 24px;
                padding: 10px 20px;
            }

            #subtitle-text {
                font-size: 10px;
                letter-spacing: 1px;
            }

            .loader-title {
                font-size: 28px;
            }

            .loader-subtitle {
                font-size: 12px;
            }
        }

        /* 移动端横屏适配 */
        @media (max-height: 500px) and (orientation: landscape) {
            #center-btn {
                font-size: 32px;
                top: 3%;
            }

            #subtitle-text {
                font-size: 14px;
                top: calc(3% + 70px);
                letter-spacing: 2px;
            }

            .card {
                width: 100px;
                height: 135px;
                left: -50px;
                top: -67px;
            }

            #scene-container {
                margin-top: 20px;
            }

            #music-control-btn {
                width: 35px !important;
                height: 35px !important;
                font-size: 16px !important;
                bottom: 15px !important;
                right: 15px !important;
            }
        }

        /* 移动端竖屏 - 缩略图+大图组合 */
        #mobile-gallery-container {
            display: none;
        }

        @media (max-width: 768px) and (orientation: portrait) {
            #scene-container {
                display: none;
            }

            #mobile-gallery-container {
                display: flex;
                flex-direction: column;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 10;
                background: linear-gradient(180deg, var(--primary-lighter) 0%, var(--primary-bg) 50%, var(--white) 100%);
                padding: 60px 15px 20px 15px;
                box-sizing: border-box;
                overflow-y: auto;
            }

            /* 画廊标题区域 */
            .gallery-header {
                text-align: center;
                padding: 15px 0 10px 0;
                cursor: pointer;
                -webkit-tap-highlight-color: transparent;
                user-select: none;
            }

            .gallery-title {
                font-size: 32px;
                color: var(--primary);
                font-family: 'Noto Serif SC', serif;
                font-weight: 600;
                margin-bottom: 8px;
                transition: all 0.3s ease;
            }

            .gallery-header:hover .gallery-title {
                color: var(--primary-light);
                transform: scale(1.05);
            }

            .gallery-subtitle {
                font-size: 16px;
                color: var(--primary-light);
                font-family: 'Noto Sans SC', sans-serif;
                letter-spacing: 2px;
                transition: all 0.3s ease;
            }

            .gallery-header:hover .gallery-subtitle {
                color: var(--primary);
            }

            /* 大图区域 */
            .gallery-main {
                flex: 0 0 52%;
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                box-sizing: border-box;
            }

            .gallery-main img {
                width: 100%;
                height: 100%;
                max-width: 360px;
                max-height: 520px;
                object-fit: cover;
                border-radius: 16px;
                box-shadow: 0 10px 40px rgba(66, 171, 243, 0.2);
                cursor: pointer;
                transition: transform 0.3s ease;
            }

            .gallery-main img:active {
                transform: scale(0.98);
            }

            .gallery-counter {
                font-size: 14px;
                color: var(--primary);
                background: rgba(255, 255, 255, 0.9);
                padding: 6px 16px;
                border-radius: 20px;
                font-family: 'Noto Sans SC', sans-serif;
                box-shadow: 0 2px 10px rgba(66, 171, 243, 0.1);
                text-align: center;
                margin: 10px auto;
                align-self: center;
            }

            /* 缩略图区域 */
            .gallery-thumbnails {
                flex: 0 0 28%;
                overflow-x: auto;
                overflow-y: hidden;
                padding: 10px 20px;
                box-sizing: border-box;
                -webkit-overflow-scrolling: touch;
            }

            .thumbnails-wrapper {
                display: flex;
                gap: 10px;
                padding: 0 40px;
            }

            .thumbnails-counter {
                font-size: 12px;
                color: var(--primary);
                text-align: center;
                font-family: 'Noto Sans SC', sans-serif;
                margin: 5px 0;
                align-self: center;
            }

            .fullscreen-nav.prev {
                left: calc(50% - 80px);

            .fullscreen-nav.next {

            .fullscreen-counter {
                position: absolute;

                left: 50%;
                transform: translateX(-50%);

    <script>
        // 配置
        const CONFIG = {
            cardCount: 10,
            radius: 550,
            rotationSpeed: 0, // 禁用自动旋转
            mouseSensitivity: 0.5 // 增加滑动灵敏度
        };

        // 10张图片路径数组 - 使用本地路径
        const cardImages = [
            "images/cards/card1.jpg",
            "images/cards/card2.jpg",
            "images/cards/card3.jpg",
            "images/cards/card4.jpg",
            "images/cards/card5.jpg",
            "images/cards/card6.jpg",
            "images/cards/card7.jpg",
            "images/cards/card8.jpg",
            "images/cards/card9.jpg",
            "images/cards/card10.jpg"
        ];

        // 10张图片对应的日期/描述
        const cardDates = [
            '成都站-9月26日', '成都站-9月27日',
            '合肥站-10月11日', '合肥站-10月12日',
            '太原站-10月25日', '太原站-10月26日',
            '北京站-11月08日', '北京站-11月09日',
            '南京站-11月22日', '南京站-11月23日'
        ];

        // 状态
        let state = {
            rotationY: 0,
            targetRotationY: 0,
            isAutoRotating: false, // 禁用自动旋转
            mouseX: 0,
            mouseY: 0,
            currentImageIndex: 0,
            bookPageIndex: 0
        };

        // 动画帧计数器
        let frameCount = 0;

        // 获取图片路径的辅助函数
        function getCardImage(index) {
            return cardImages[index] || cardImages[0];
        }

        // 移动端画廊功能
        let currentGalleryIndex = 0;
        const totalGalleryCards = 10;

        function initGallery() {
            // 检查是否在移动端竖屏模式
            const mobileGallery = document.getElementById('mobile-gallery-container');
            if (!mobileGallery || window.getComputedStyle(mobileGallery).display === 'none') {
                return; // 如果不是移动端竖屏，不初始化画廊
            }
            
            // 初始化大图
            updateMainImage(0);
            
            // 创建缩略图
            const thumbnailsWrapper = document.querySelector('.thumbnails-wrapper');
            if (!thumbnailsWrapper) return; // 如果找不到缩略图容器，跳过
            thumbnailsWrapper.innerHTML = '';
            
            for (let i = 0; i < totalGalleryCards; i++) {
                const thumb = document.createElement('div');
                thumb.className = 'thumbnail-item' + (i === 0 ? ' active' : '');
                // 懒加载：只加载前5张和当前可见的缩略图
                if (i < 5) {
                    thumb.innerHTML = `<img src="${getCardImage(i)}" alt="" loading="lazy">`;
                } else {
                    thumb.innerHTML = `<img data-src="${getCardImage(i)}" alt="" class="lazy-thumb">`;
                }
                thumb.onclick = () => selectThumbnail(i);
                thumbnailsWrapper.appendChild(thumb);
            }
            
            // 初始化懒加载观察器
            initLazyLoad();
            
            // 添加大图区域滑动切换
            setupMainImageSwipe();
            
            // 添加全屏模式滑动切换
            setupFullscreenSwipe();
        }
        
        // 懒加载初始化
        function initLazyLoad() {
            // 处理缩略图懒加载
            const lazyThumbs = document.querySelectorAll('.lazy-thumb');
            
            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        if (img.dataset.src) {
                            img.src = img.dataset.src;
                            img.removeAttribute('data-src');
                        }
                        img.classList.remove('lazy-thumb');
                        observer.unobserve(img);
                    }
                });
            }, {
                rootMargin: '50px 0px',
                threshold: 0.01
            });
            
            lazyThumbs.forEach(img => imageObserver.observe(img));
        }
        
        // 2D卡片懒加载 - 根据屏幕位置加载
        function loadVisibleCards() {
            const lazyImages = document.querySelectorAll('.lazy-card-img');
            const viewportWidth = window.innerWidth;
            const loadRange = viewportWidth * 0.8; // 加载屏幕宽度 80% 范围内的卡片
            
            lazyImages.forEach(img => {
                const card = img.closest('.card');
                if (!card) return; // 如果找不到卡片，跳过
                
                const rect = card.getBoundingClientRect();
                const cardCenterX = rect.left + rect.width / 2;
                
                // 检查卡片是否在屏幕可见范围内
                const isVisible = cardCenterX > -loadRange && cardCenterX < viewportWidth + loadRange;
                
                if (isVisible && img.dataset.src) {
                    img.src = img.dataset.src;
                    img.removeAttribute('data-src');
                    img.classList.remove('lazy-card-img');
                    img.style.opacity = '1';
                }
            });
        }
        
        // 大图区域滑动切换
        function setupMainImageSwipe() {
            const mainImage = document.getElementById('gallery-main-img');
            let touchStartX = 0;
            let touchEndX = 0;
            
            mainImage.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            
            mainImage.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });
            
            function handleSwipe() {
                const swipeThreshold = 50;
                const diff = touchStartX - touchEndX;
                
                if (Math.abs(diff) > swipeThreshold) {
                    if (diff > 0) {
                        // 向左滑动，下一张
                        selectThumbnail((currentGalleryIndex + 1) % totalGalleryCards);
                    } else {
                        // 向右滑动，上一张
                        selectThumbnail((currentGalleryIndex - 1 + totalGalleryCards) % totalGalleryCards);
                    }
                }
            }
        }
        
        // 全屏模式滑动切换
        function setupFullscreenSwipe() {
            const fullscreen = document.getElementById('gallery-fullscreen');
            let touchStartX = 0;
            let touchEndX = 0;
            
            fullscreen.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            
            fullscreen.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });
            
            function handleSwipe() {
                const swipeThreshold = 50;
                const diff = touchStartX - touchEndX;
                
                if (Math.abs(diff) > swipeThreshold) {
                    if (diff > 0) {
                        // 向左滑动，下一张
                        navigateFullscreen(1);
                    } else {
                        // 向右滑动，上一张
                        navigateFullscreen(-1);
                    }
                }
            }
        }

        // 跳转到home页面
        function goToHome() {
            window.location.href = 'home.html';
        }

        function selectThumbnail(index) {
            currentGalleryIndex = index;
            updateMainImage(index);
            updateThumbnails(index);
        }

        function updateMainImage(index) {
            const mainImg = document.getElementById('gallery-main-img');
            mainImg.src = getCardImage(index);
        }

        function updateThumbnails(activeIndex) {
            const thumbs = document.querySelectorAll('.thumbnail-item');
            thumbs.forEach((thumb, index) => {
                if (index === activeIndex) {
                    thumb.classList.add('active');
                    // 滚动到可见区域
                    thumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                } else {
                    thumb.classList.remove('active');
                }
            });
        }

        function openFullscreen() {
            document.getElementById('gallery-fullscreen').style.display = 'flex';
            document.getElementById('fullscreen-img').src = getCardImage(currentGalleryIndex);
            document.querySelector('.fullscreen-counter').textContent = `${currentGalleryIndex + 1} / ${totalGalleryCards}`;
        }

        function closeFullscreen() {
            document.getElementById('gallery-fullscreen').style.display = 'none';
        }

        function navigateFullscreen(direction) {
            currentGalleryIndex += direction;
            if (currentGalleryIndex < 0) {
                currentGalleryIndex = totalGalleryCards - 1;
            } else if (currentGalleryIndex >= totalGalleryCards) {
                currentGalleryIndex = 0;
            }
            
            document.getElementById('fullscreen-img').src = getCardImage(currentGalleryIndex);
            document.querySelector('.fullscreen-counter').textContent = `${currentGalleryIndex + 1} / ${totalGalleryCards}`;
            updateMainImage(currentGalleryIndex);
            updateThumbnails(currentGalleryIndex);
        }

        // 自动缓慢向左滑动
        function startAutoSlide() {
            const slideSpeed = 0.2; // 滑动速度
            const slideInterval = setInterval(() => {
                state.targetRotationY -= slideSpeed;
                
                // 当滑动到第10张卡片时，回到第1张
                const cardWidth = window.innerHeight < 500 && window.innerWidth > window.innerHeight ? 120 : 170;
                const maxOffset = -(CONFIG.cardCount - 1) * cardWidth;
                if (state.targetRotationY < maxOffset) {
                    state.targetRotationY = 0;
                }
            }, 16); // 约60fps
            
            // 保存interval ID以便停止
            window.autoSlideInterval = slideInterval;
        }
        
        // 停止自动滑动
        function stopAutoSlide() {
            if (window.autoSlideInterval) {
                clearInterval(window.autoSlideInterval);
                window.autoSlideInterval = null;
            }
        }

        // 初始化
        function init() {
            try {
                createCards();
                setupEventListeners();
                animate();
                
                // 初始化3D卡片懒加载
                initLazyLoad();
                
                // 加载初始可见的3D卡片
                setTimeout(() => loadVisibleCards(), 100);
                
                // 初始化移动端画廊
                initGallery();
                
                // 重置到第1张卡片位置
                const cardWidth = window.innerHeight < 500 && window.innerWidth > window.innerHeight ? 120 : 170;
                const centerOffset = (CONFIG.cardCount - 1) * cardWidth / 2;
                state.targetRotationY = centerOffset;
                
                // 启动自动缓慢向左滑动
                setTimeout(() => startAutoSlide(), 1500);
            } catch (error) {
                console.error('初始化错误:', error);
            }

            // 隐藏加载动画 - 无论初始化是否成功，1秒后都隐藏
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.classList.add('hidden');
                }
            }, 1000);
        }

        // 创建卡片
        function createCards() {
            const carousel = document.getElementById('carousel');
            const angleStep = 360 / CONFIG.cardCount;
            
            // 根据屏幕宽度调整卡片间距 - 横屏时使用更小的间距
            const isLandscape = window.innerHeight < 500 && window.innerWidth > window.innerHeight;
            const cardWidthInit = isLandscape ? 120 : 170;

            for (let i = 0; i < CONFIG.cardCount; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = i;

                // 创建图片元素 - 只加载屏幕中央的卡片，其余懒加载
                const img = document.createElement('img');
                // 计算卡片是否在屏幕中央区域（初始状态）
                const totalWidth = CONFIG.cardCount * cardWidthInit;
                const x = (i * cardWidthInit) - (totalWidth / 2) + (cardWidthInit / 2);
                const viewportWidth = window.innerWidth || 1920;
                const cardScreenX = (viewportWidth / 2) + x;
                const isCenterCard = Math.abs(cardScreenX - viewportWidth / 2) < viewportWidth * 0.4;
                
                if (isCenterCard) {
                    img.src = getCardImage(i);
                    img.style.opacity = '1';
                } else {
                    img.dataset.src = getCardImage(i);
                    img.classList.add('lazy-card-img');
                    img.style.opacity = '0';
                    img.style.backgroundColor = 'rgba(255,255,255,0.1)';
                }
                
                img.alt = `卡片 ${i + 1}`;
                img.loading = 'lazy';
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.style.transition = 'opacity 0.3s ease';
                img.onerror = function() {
                    this.style.display = 'none';
                    const placeholder = document.createElement('div');
                    placeholder.className = 'card-placeholder';
                    placeholder.textContent = `记忆 ${i + 1}`;
                    card.appendChild(placeholder);
                };
                img.onload = function() {
                    this.style.opacity = '1';
                };
                card.appendChild(img);

                // 计算2D位置 - 水平排列
                const cardWidthPos = isLandscape ? 120 : 170; // 卡片宽度 + 间距
                const totalWidthPos = CONFIG.cardCount * cardWidthPos;
                const xPos = (i * cardWidthPos) - (totalWidthPos / 2) + (cardWidthPos / 2);
                // 交替上下：偶数在上，奇数在下
                const offsetYValue = isLandscape ? 65 : 105;
                const offsetY = (i % 2 === 0) ? -offsetYValue : offsetYValue;
                // 根据距离中心的远近设置缩放和透明度
                const centerIndex = Math.floor(CONFIG.cardCount / 2);
                const distanceFromCenter = Math.abs(i - centerIndex);
                const scale = Math.max(0.7, 1 - (distanceFromCenter * 0.05));
                const opacity = Math.max(0.5, 1 - (distanceFromCenter * 0.1));

                card.style.transform = `translateX(${xPos}px) translateY(${offsetY}px) scale(${scale})`;
                card.style.opacity = opacity;
                card.style.zIndex = 100 - distanceFromCenter;

                // 点击事件
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    state.isAutoRotating = false;
                    state.currentImageIndex = i;
                    // 加载点击卡片附近的图片
                    loadVisibleCards();
                    showImage(getCardImage(i), i);
                });

                carousel.appendChild(card);
            }
        }

        // 设置事件监听
        function setupEventListeners() {
            let isDragging = false;
            let startX = 0;
            let currentRotation = 0;
            let dragStartTime = 0;
            let dragThreshold = 5; // 移动超过5px认为是拖动
            let hasMoved = false;

            document.addEventListener('mousedown', (e) => {
                if (e.target.closest('#center-btn')) return;
                isDragging = true;
                hasMoved = false;
                dragStartTime = Date.now();
                startX = e.clientX;
                currentRotation = state.targetRotationY;
                document.body.style.cursor = 'grabbing';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaX = e.clientX - startX;
                if (Math.abs(deltaX) > dragThreshold) {
                    hasMoved = true;
                }
                state.targetRotationY = currentRotation + deltaX * 0.4;
            });

            document.addEventListener('mouseup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                document.body.style.cursor = 'default';
                
                // 如果没有移动且点击的是卡片，触发卡片点击
                if (!hasMoved && e.target.closest('.card')) {
                    const card = e.target.closest('.card');
                    const index = parseInt(card.dataset.index);
                    if (!isNaN(index)) {
                        state.isAutoRotating = false;
                        state.currentImageIndex = index;
                        showImage(getCardImage(index), index);
                    }
                }
            });

            document.addEventListener('mouseleave', () => {
                isDragging = false;
                document.body.style.cursor = 'default';
            });

            document.getElementById('center-btn').addEventListener('click', transitionToHome);

            let touchStartX = 0;
            let touchCurrentRotation = 0;
            let touchDragStartTime = 0;
            let touchHasMoved = false;

            document.addEventListener('touchstart', (e) => {
                if (e.target.closest('#center-btn')) return;
                touchHasMoved = false;
                touchDragStartTime = Date.now();
                touchStartX = e.touches[0].clientX;
                touchCurrentRotation = state.targetRotationY;
            }, { passive: true });

            document.addEventListener('touchmove', (e) => {
                const touchX = e.touches[0].clientX;
                const diff = touchX - touchStartX;
                if (Math.abs(diff) > dragThreshold) {
                    touchHasMoved = true;
                }
                state.targetRotationY = touchCurrentRotation + diff * 0.4;
            }, { passive: true });

            document.addEventListener('touchend', (e) => {
                // 如果没有移动且点击的是卡片，触发卡片点击
                if (!touchHasMoved && e.target.closest('.card')) {
                    const card = e.target.closest('.card');
                    const index = parseInt(card.dataset.index);
                    if (!isNaN(index)) {
                        state.isAutoRotating = false;
                        state.currentImageIndex = index;
                        showImage(getCardImage(index), index);
                    }
                }
            });
        }

        // 动画循环
        function animate() {
            const cards = document.querySelectorAll('.card');
            
            // 2D滑动：只更新卡片位置
            // 根据屏幕宽度调整卡片间距 - 横屏时使用更小的间距
            const isLandscape = window.innerHeight < 500 && window.innerWidth > window.innerHeight;
            const cardWidth = isLandscape ? 120 : 170;
            const totalWidth = CONFIG.cardCount * cardWidth;
            const offsetX = state.targetRotationY;
            const offsetYValue = isLandscape ? 65 : 105;
            
            cards.forEach((card, i) => {
                const baseX = (i * cardWidth) - (totalWidth / 2) + (cardWidth / 2);
                const x = baseX + offsetX;
                const offsetY = (i % 2 === 0) ? -offsetYValue : offsetYValue;
                
                // 计算距离中心的距离，用于缩放和透明度
                const viewportCenter = window.innerWidth / 2;
                const cardScreenX = (window.innerWidth / 2) + x;
                const distanceFromCenter = Math.abs(cardScreenX - viewportCenter) / (window.innerWidth / 3);
                const scale = Math.max(0.7, 1 - (distanceFromCenter * 0.3));
                const opacity = Math.max(0.3, 1 - (distanceFromCenter * 0.5));
                
                card.style.transform = `translateX(${x}px) translateY(${offsetY}px) scale(${scale})`;
                card.style.opacity = opacity;
                card.style.zIndex = Math.floor(100 - distanceFromCenter * 10);
            });
            
            // 每30帧（约0.5秒）检查一次可见卡片
            frameCount++;
            if (frameCount % 30 === 0) {
                loadVisibleCards();
            }
            
            requestAnimationFrame(animate);
        }

        // 显示图片
        function showImage(src, index) {
            const viewer = document.getElementById('image-viewer');
            const img = document.getElementById('viewer-img');
            img.src = src;
            viewer.classList.add('active');
        }

        // 切换图片
        function navigateImage(direction, e) {
            if (e) e.stopPropagation();
            state.currentImageIndex += direction;
            if (state.currentImageIndex < 0) {
                state.currentImageIndex = CONFIG.cardCount - 1;
            } else if (state.currentImageIndex >= CONFIG.cardCount) {
                state.currentImageIndex = 0;
            }
            const img = document.getElementById('viewer-img');
            img.src = getCardImage(state.currentImageIndex);
        }

        // 关闭图片查看器
        function closeImageViewer(e) {
            if (e && e.target !== e.currentTarget && !e.target.classList.contains('close-btn') && !e.target.classList.contains('nav-btn')) {
                return;
            }
            document.getElementById('image-viewer').classList.remove('active');
            state.isAutoRotating = true;
        }

        // 过渡到首页
        function transitionToHome() {
            const btn = document.getElementById('center-btn');
            const cards = document.querySelectorAll('.card');
            const container = document.getElementById('scene-container');

            state.isAutoRotating = false;
            btn.classList.add('clicked');

            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('scatter');
                }, index * 40);
            });

            setTimeout(() => {
                container.classList.add('fade-out');
            }, 400);

            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1400);
        }

        init();
    </script>
    <script src="js/music.js"></script>
</body>
</html>
