<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太原站 - 鹭卓2025 RTTT巡演</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/city-page.css">
</head>
<body>
    <!-- 主内容 -->
    <main class="main-content" style="padding-top: 0;">
        <!-- 城市头部（包含导航栏） -->
        <section class="city-header" style="position: relative; padding-top: 70px;">
            <!-- 导航栏 -->
            <nav class="navbar" style="background: transparent; position: absolute; top: 0; left: 0; right: 0; z-index: 9999; box-shadow: none;">
                <div class="navbar-container">
                    <a href="home.html" class="navbar-logo">鹭卓2025RTTT巡演记录</a>
                    <div class="navbar-nav" id="navbarNav">
                        <a href="home.html" class="nav-item">首页</a>
                        <a href="chengdu.html" class="nav-item">成都站</a>
                        <a href="hefei.html" class="nav-item">合肥站</a>
                        <a href="taiyuan.html" class="nav-item active">太原站</a>
                        <a href="beijing.html" class="nav-item">北京站</a>
                        <a href="nanjing.html" class="nav-item">南京站</a>
                        <a href="stage.html" class="nav-item">舞台直拍</a>
                    </div>
                    <button class="navbar-toggle" id="navbarToggle" onclick="document.getElementById('navbarNav').classList.toggle('active')" style="position: relative; z-index: 10000; cursor: pointer; pointer-events: auto;">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </nav>
            <div class="city-header-content" style="position: absolute; bottom: 50px; left: 40px; text-align: left; z-index: 1;">
                <h2 class="city-name" style="margin-bottom: 8px; font-size: 35px;">太原站</h2>
                <p class="city-date" style="opacity: 0.9; color: var(--white); font-size: 13px;">待定</p>
            </div>
        </section>

        <!-- 页面内容 -->
        <div class="page-container">
            <!-- 上半区两栏布局 (60%:40%) -->
            <section class="upper-section">
                <!-- 纪录片模块 -->
                <div class="documentary-module">
                    <div class="video-card" onclick="openDocumentaryModal()">
                        <div class="video-thumbnail">
                            <img src="images/cards/card1.jpg" alt="太原站纪录片封面" onerror="this.style.display='none'">
                            <div class="play-overlay">
                                <div class="play-btn">▶</div>
                            </div>
                        </div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">太原站纪录片</div>
                        <div class="video-desc">记录鹭卓太原站的精彩瞬间与幕后花絮</div>
                    </div>
                </div>

                <!-- 垂直导航区 -->
                <div class="nav-module">
                    <button class="nav-button" onclick="openGroupPhotoModal()">
                        <span class="nav-icon">📸</span>
                        <span>合照区</span>
                    </button>
                    <button class="nav-button" onclick="openBouquetModal()">
                        <span class="nav-icon">💐</span>
                        <span>花束区</span>
                    </button>
                    <button class="nav-button" onclick="openOfficialModal()">
                        <span class="nav-icon">📷</span>
                        <span>官摄区</span>
                    </button>
                    <button class="nav-button" onclick="openPosterNavModal()">
                        <span class="nav-icon">🎬</span>
                        <span>海报信封区</span>
                    </button>
                </div>
            </section>

            <!-- 下半区三栏布局 (1:1:1) -->
            <section class="lower-section">
                <!-- 海报花絮区 -->
                <div class="lower-module">
                    <div class="module-header">
                        <h3 class="module-title">花絮定妆照</h3>
                    </div>
                    <div class="card-grid">
                        <div class="card" onclick="openPosterModal()">
                            <img src="assets/images/poster-cover.jpg" alt="海报花絮" class="card-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22533%22><rect fill=%22%23E8F6FA%22 width=%22100%25%22 height=%22100%25%22/><text fill=%22%235BA4C9%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 font-size=%2220%22>海报花絮</text></svg>'">
                            <div class="card-overlay">
                                <div class="card-title">花絮</div>
                                <div class="card-subtitle">点击查看更多</div>
                            </div>
                        </div>
                        <div class="card" onclick="openStylingModal()">
                            <img src="assets/images/styling-cover.jpg" alt="定妆照" class="card-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22533%22><rect fill=%22%23E8F6FA%22 width=%22100%25%22 height=%22100%25%22/><text fill=%22%235BA4C9%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 font-size=%2218%22>定妆照</text></svg>'">
                            <div class="card-overlay">
                                <div class="card-title">定妆照</div>
                                <div class="card-subtitle">造型展示</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 直拍区 -->
                <div class="lower-module">
                    <div class="module-header">
                        <h3 class="module-title">舞台直拍</h3>
                    </div>
                    <div class="card-grid">
                        <div class="card" onclick="openFancamModal('day1')">
                            <img src="assets/images/fancam-day1-cover.jpg" alt="Day 1 直拍" class="card-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22533%22><rect fill=%22%23E8F6FA%22 width=%22100%25%22 height=%22100%25%22/><text fill=%22%235BA4C9%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 font-size=%2220%22>Day 1 直拍</text></svg>'">
                            <div class="card-overlay">
                                <div class="card-title">Day 1</div>
                                <div class="card-subtitle">舞台直拍</div>
                            </div>
                        </div>
                        <div class="card" onclick="openFancamModal('day2')">
                            <img src="assets/images/fancam-day2-cover.jpg" alt="Day 2 直拍" class="card-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22533%22><rect fill=%22%23E8F6FA%22 width=%22100%25%22 height=%22100%25%22/><text fill=%22%235BA4C9%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 font-size=%2220%22>Day 2 直拍</text></svg>'">
                            <div class="card-overlay">
                                <div class="card-title">Day 2</div>
                                <div class="card-subtitle">舞台直拍</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 图集区 -->
                <div class="lower-module">
                    <div class="module-header">
                        <h3 class="module-title">精彩图集</h3>
                    </div>
                    <div class="card-grid">
                        <div class="card" onclick="openGalleryModal('stage')">
                            <img src="assets/images/gallery-stage-cover.jpg" alt="舞台图集" class="card-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22533%22><rect fill=%22%23E8F6FA%22 width=%22100%25%22 height=%22100%25%22/><text fill=%22%235BA4C9%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 font-size=%2220%22>舞台图集</text></svg>'">
                            <div class="card-overlay">
                                <div class="card-title">舞台</div>
                                <div class="card-subtitle">精彩瞬间</div>
                            </div>
                        </div>
                        <div class="card" onclick="openGalleryModal('backstage')">
                            <img src="assets/images/gallery-backstage-cover.jpg" alt="后台图集" class="card-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22533%22><rect fill=%22%23E8F6FA%22 width=%22100%25%22 height=%22100%25%22/><text fill=%22%235BA4C9%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 font-size=%2220%22>后台图集</text></svg>'">
                            <div class="card-overlay">
                                <div class="card-title">后台</div>
                                <div class="card-subtitle">幕后花絮</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p class="footer-text">鹭卓2025 RTTT巡演记录 | For Luzhou，From 橘子suuoia_Lu</p>
    </footer>

    <!-- 回到顶部按钮 -->
    <button class="back-to-top" id="backToTop" onclick="scrollToTop()">↑</button>

    <!-- 引入JS -->
    <script src="js/card-album.js"></script>
    <script src="js/video-player.js"></script>
    <script>
        // 垂直导航数据
        const navData = {
            groupPhoto: [   // 合照区照片
                'images/taiyuan/ty_groupphoto/ty_groupphoto1.webp',
                'images/taiyuan/ty_groupphoto/ty_groupphoto2.webp',
                'images/taiyuan/ty_groupphoto/ty_groupphoto3.webp',
                'images/taiyuan/ty_groupphoto/ty_groupphoto4.webp',
                'images/taiyuan/ty_groupphoto/ty_groupphoto5.webp',
                'images/taiyuan/ty_groupphoto/ty_groupphoto6.webp',
                'images/taiyuan/ty_groupphoto/ty_groupphoto7.webp',
                'images/taiyuan/ty_groupphoto/ty_groupphoto8.webp',
                'images/taiyuan/ty_groupphoto/ty_groupphoto9.webp',
                'images/taiyuan/ty_groupphoto/ty_groupphoto10.webp'
            ],
            bouquet: [    // 花束区照片
                'images/taiyuan/ty_flower/ty_flower_1.webp',
                'images/taiyuan/ty_flower/ty_flower_2.webp',
                'images/taiyuan/ty_flower/ty_flower_3.webp',
                'images/taiyuan/ty_flower/ty_flower_4.webp',
                'images/taiyuan/ty_flower/ty_flower_5.webp',
                'images/taiyuan/ty_flower/ty_flower_6.webp',
                'images/taiyuan/ty_flower/ty_flower_7.webp',
                'images/taiyuan/ty_flower/ty_flower_8.webp',
                'images/taiyuan/ty_flower/ty_flower_9.webp',
                'images/taiyuan/ty_flower/ty_flower_10.webp'
            ],
            official: [    // 官摄区照片（三层级结构）
                {
                    title: '鹭卓帅哥',
                    cover: 'images/taiyuan/ty_official/luzhuohao/luzhuohao_1.webp',
                    children: [
                        { image: 'images/taiyuan/ty_official/luzhuohao/luzhuohao_1.webp', thumb: 'images/taiyuan/ty_official/luzhuohao/luzhuohao_1.webp', isLeaf: true },
                        { image: 'images/taiyuan/ty_official/luzhuohao/luzhuohao_2.webp', thumb: 'images/taiyuan/ty_official/luzhuohao/luzhuohao_2.webp', isLeaf: true },
                        { image: 'images/taiyuan/ty_official/luzhuohao/luzhuohao_3.webp', thumb: 'images/taiyuan/ty_official/luzhuohao/luzhuohao_3.webp', isLeaf: true }
                    ]
                },
                {
                    title: '玫瑰园',
                    cover: 'images/taiyuan/ty_official/guiyuan/guiyuan_1.webp',
                    children: [
                        { image: 'images/taiyuan/ty_official/guiyuan/guiyuan_1.webp', thumb: 'images/taiyuan/ty_official/guiyuan/guiyuan_1.webp', isLeaf: true },
                        { image: 'images/taiyuan/ty_official/guiyuan/guiyuan_2.webp', thumb: 'images/taiyuan/ty_official/guiyuan/guiyuan_2.webp', isLeaf: true },
                        { image: 'images/taiyuan/ty_official/guiyuan/guiyuan_3.webp', thumb: 'images/taiyuan/ty_official/guiyuan/guiyuan_3.webp', isLeaf: true }
                    ]
                },
                {
                    title: '莫拉娱乐',
                    cover: 'images/taiyuan/ty_official/mola/mola_1.webp',
                    children: [
                        { image: 'images/taiyuan/ty_official/mola/mola_1.webp', thumb: 'images/taiyuan/ty_official/mola/mola_1.webp', isLeaf: true },
                        { image: 'images/taiyuan/ty_official/mola/mola_2.webp', thumb: 'images/taiyuan/ty_official/mola/mola_2.webp', isLeaf: true },
                        { image: 'images/taiyuan/ty_official/mola/mola_3.webp', thumb: 'images/taiyuan/ty_official/mola/mola_3.webp', isLeaf: true }
                    ]
                }
            ],
            poster: [    // 海报信封区照片
                'images/taiyuan/ty_poster_letter/ty_poster_letter1.webp',
                'images/taiyuan/ty_poster_letter/ty_poster_letter2.webp',
                'images/taiyuan/ty_poster_letter/ty_poster_letter3.webp',
                'images/taiyuan/ty_poster_letter/ty_poster_letter4.webp',
                'images/taiyuan/ty_poster_letter/ty_poster_letter5.webp',
                'images/taiyuan/ty_poster_letter/ty_poster_letter6.webp'
            ]
        };

        // 海报花絮数据
        const posterData = [
            'images/cards/card1.jpg',
            'images/cards/card2.jpg',
            'images/cards/card3.jpg',
            'images/cards/card4.jpg'
        ];

        // 定妆照数据
        const stylingData = [
            { title: '造型1', image: 'images/cards/card1.jpg', isLeaf: true },
            { title: '造型2', image: 'images/cards/card2.jpg', isLeaf: true },
            { title: '造型3', image: 'images/cards/card3.jpg', isLeaf: true }
        ];

        // 直拍数据
        const fancamData = [
            {
                title: 'Day 1',
                cover: 'images/cards/card1.jpg',
                children: [
                    { title: '开场', video: 'https://weibo.com/tv/show/1034:5226437192646763', isLeaf: true },
                    { title: '第一首', video: 'https://weibo.com/tv/show/1034:5226437192646763', isLeaf: true }
                ]
            },
            {
                title: 'Day 2',
                cover: 'images/cards/card2.jpg',
                children: [
                    { title: '开场', video: 'https://weibo.com/tv/show/1034:5226437192646763', isLeaf: true },
                    { title: '第一首', video: 'https://weibo.com/tv/show/1034:5226437192646763', isLeaf: true }
                ]
            }
        ];

        // 图集数据
        const galleryData = [
            {
                title: '舞台',
                cover: 'images/cards/card1.jpg',
                children: [
                    { title: '舞台1', image: 'images/cards/card1.jpg', isLeaf: true },
                    { title: '舞台2', image: 'images/cards/card2.jpg', isLeaf: true }
                ]
            },
            {
                title: '后台',
                cover: 'images/cards/card2.jpg',
                children: [
                    { title: '后台1', image: 'images/cards/card3.jpg', isLeaf: true },
                    { title: '后台2', image: 'images/cards/card4.jpg', isLeaf: true }
                ]
            }
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initBackToTop();
        });

        // 打开合照区弹窗
        function openGroupPhotoModal() {
            cardAlbum.openNavModal('合照区', navData.groupPhoto);
        }

        // 打开花束区弹窗
        function openBouquetModal() {
            cardAlbum.openNavModal('花束区', navData.bouquet);
        }

        // 打开合照区弹窗
        function openGroupPhotoModal() {
            cardAlbum.openNavModal('合照区', navData.groupPhoto);
        }

        // 打开花束区弹窗
        function openBouquetModal() {
            cardAlbum.openNavModal('花束区', navData.bouquet);
        }

        // 打开官摄区弹窗
        function openOfficialModal() {
            cardAlbum.openModal('官摄区', navData.official, 0);
        }

        // 打开海报花絮弹窗
        function openPosterModal() {
            cardAlbum.openPosterModal('海报花絮', posterData);
        }

        // 打开定妆照弹窗
        function openStylingModal() {
            cardAlbum.openModal('定妆照', stylingData, 0);
        }

        // 打开直拍区弹窗
        function openFancamModal(day) {
            if (day === 'day1') {
                cardAlbum.openModal('Day 1 直拍', fancamData[0].children, 0);
            } else {
                cardAlbum.openModal('Day 2 直拍', fancamData[1].children, 0);
            }
        }

        // 打开图集弹窗
        function openGalleryModal(type) {
            const title = type === 'stage' ? '舞台图集' : '后台图集';
            const data = type === 'stage' ? galleryData[0].children : galleryData[1].children;
            cardAlbum.openModal(title, data, 0);
        }
        
        // 播放视频
        function playVideo(videoUrl, title) {
            const modal = document.createElement('div');
            modal.className = 'video-modal';
            modal.innerHTML = `
                <div class="video-modal-overlay" onclick="closeVideoModal()"></div>
                <div class="video-modal-content">
                    <button class="video-modal-close" onclick="closeVideoModal()">×</button>
                    <h3 class="video-modal-title">${title}</h3>
                    <div class="video-iframe-container">
                        <iframe src="${videoUrl}" frameborder="0" scrolling="no" allowfullscreen></iframe>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';
        }
        
        // 关闭视频弹窗
        function closeVideoModal() {
            const modal = document.querySelector('.video-modal');
            if (modal) {
                modal.remove();
                document.body.style.overflow = '';
            }
        }
        
        // 打开纪录片弹窗
        function openDocumentaryModal() {
            playVideo('https://weibo.com/tv/show/1034:5226437192646763?from=old_pc_videoshow', '太原站纪录片');
        }
        
        // 打开海报信封区弹窗
        function openPosterNavModal() {
            cardAlbum.openNavModal('海报信封区', navData.poster);
        }
        
        // 回到顶部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 初始化回到顶部按钮
        function initBackToTop() {
            const backToTop = document.getElementById('backToTop');
            if (backToTop) {
                window.addEventListener('scroll', function() {
                    if (window.pageYOffset > 300) {
                        backToTop.classList.add('visible');
                    } else {
                        backToTop.classList.remove('visible');
                    }
                });
            }
        }
        
    </script>
    <script src="js/music.js"></script>
</body>
</html>
