            cardAlbum.openModal(title, data, 0);

        // 播放视频
        function playVideo(videoUrl, title) {
            const modal = document.createElement('div');
            modal.className = 'video-modal';
            modal.innerHTML = `
                <div class="video-modal-overlay" onclick="closeVideoModal()"></div>
                <div class="video-modal-content">
                    <button class="video-modal-close" onclick="closeVideoModal()">×</button>
                    <h3 class="video-modal-title">${title}</h3>
                    <div class="video-iframe-container">
                        <iframe src="${videoUrl}" frameborder="0" scrolling="no" allowfullscreen></iframe>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';
        }
        
        // 关闭视频弹窗
        function closeVideoModal() {
            const modal = document.querySelector('.video-modal');
            if (modal) {
                modal.remove();
                document.body.style.overflow = '';
            }
        }

            const posterTitles = ['手写信信封', '太原站手写信', '主海报', '倒计时3天', '倒计时2天', '倒计时1天'];
            const posterData = navData.poster.map((img, i) => ({

                thumb: img,
                isLeaf: true
            }));
            cardAlbum.openModal('海报信封区', posterData, 0);
        }
        
        // 回到顶部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 初始化回到顶部按钮
        function initBackToTop() {
            const backToTop = document.getElementById('backToTop');
            if (backToTop) {
                window.addEventListener('scroll', function() {
                    if (window.pageYOffset > 300) {
                        backToTop.classList.add('visible');
                    } else {
                        backToTop.classList.remove('visible');
                    }
                });
            }
