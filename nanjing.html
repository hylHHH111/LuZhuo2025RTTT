                    break;
            }
            cardAlbum.openModal(title, data, 0);
        }
        
        // 播放视频
        function playVideo(videoUrl, title) {
            const modal = document.createElement('div');
            modal.className = 'video-modal';
            modal.innerHTML = `
                <div class="video-modal-overlay" onclick="closeVideoModal()"></div>
                <div class="video-modal-content">
                    <button class="video-modal-close" onclick="closeVideoModal()">×</button>
                    <h3 class="video-modal-title">${title}</h3>
                    <div class="video-iframe-container">
                        <iframe src="${videoUrl}" frameborder="0" scrolling="no" allowfullscreen></iframe>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';
        }
        
        // 关闭视频弹窗
        function closeVideoModal() {
            const modal = document.querySelector('.video-modal');
            if (modal) {
                modal.remove();
                document.body.style.overflow = '';
            }
        }
        
        // 打开纪录片弹窗
        function openDocumentaryModal() {
            playVideo('https://weibo.com/tv/show/1034:5226437192646763?from=old_pc_videoshow', '南京站纪录片');
        }
        
        // 打开海报信封区弹窗
        function openPosterNavModal() {
            cardAlbum.openNavModal('海报信封区', navData.poster);
        }
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.getElementById('navbarNav')?.classList.remove('active');
            });
        });

        // 滚动时自动关闭移动端导航栏
        let lastScrollY = window.scrollY;
        window.addEventListener('scroll', function() {
            const navbarNav = document.getElementById('navbarNav');
            if (navbarNav && navbarNav.classList.contains('active')) {
                if (Math.abs(window.scrollY - lastScrollY) > 5) {
                    navbarNav.classList.remove('active');
                }
            }
            lastScrollY = window.scrollY;
        }, { passive: true });

        // 点击页面其他地方关闭移动端导航栏
        document.addEventListener('click', function(e) {
            const navbarNav = document.getElementById('navbarNav');
            const navbarToggle = document.querySelector('.navbar-toggle');
            const isClickInNavbar = navbarNav && (navbarNav.contains(e.target) || navbarToggle.contains(e.target));
            
            if (!isClickInNavbar && navbarNav && navbarNav.classList.contains('active')) {
                navbarNav.classList.remove('active');
            }
        });
    </script>
    <script src="js/music.js"></script>
</body>
</html>
