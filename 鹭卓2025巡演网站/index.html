<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鹭卓2025 RTTT巡演</title>
    <link rel="stylesheet" href="css/variables.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, #f5f9ff 0%, #e8f4fc 50%, #f0f8ff 100%);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* 粒子背景 */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 光晕效果 */
        .glow-effect {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(115, 180, 233, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: floatGlow 8s ease-in-out infinite;
        }

        .glow-effect:nth-child(1) {
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .glow-effect:nth-child(2) {
            bottom: -200px;
            left: -100px;
            background: radial-gradient(circle, rgba(194, 222, 245, 0.4) 0%, transparent 70%);
            animation-delay: -4s;
        }

        @keyframes floatGlow {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 0.8; }
        }

        /* 手绘风格装饰 */
        .hand-drawn-star {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
        }

        .hand-drawn-star svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--primary);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .star-1 {
            top: 15%;
            left: 8%;
            width: 40px;
            height: 40px;
            animation: twinkle 3s ease-in-out infinite;
        }

        .star-2 {
            top: 25%;
            right: 12%;
            width: 30px;
            height: 30px;
            animation: twinkle 3s ease-in-out infinite 1s;
        }

        .star-3 {
            bottom: 20%;
            left: 15%;
            width: 35px;
            height: 35px;
            animation: twinkle 3s ease-in-out infinite 0.5s;
        }

        .star-4 {
            bottom: 30%;
            right: 8%;
            width: 25px;
            height: 25px;
            animation: twinkle 3s ease-in-out infinite 1.5s;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; transform: scale(1) rotate(0deg); }
            50% { opacity: 0.8; transform: scale(1.2) rotate(15deg); }
        }

        /* 手绘波浪线 */
        .hand-drawn-wave {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
        }

        .wave-1 {
            top: 10%;
            left: 0;
            width: 200px;
            height: 60px;
            animation: waveMove 6s ease-in-out infinite;
        }

        .wave-2 {
            bottom: 15%;
            right: 0;
            width: 180px;
            height: 50px;
            animation: waveMove 6s ease-in-out infinite 3s;
            transform: scaleX(-1);
        }

        @keyframes waveMove {
            0%, 100% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(20px) translateY(-10px); }
        }

        /* 手绘圆圈装饰 */
        .hand-drawn-circle {
            position: fixed;
            border: 2px dashed var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.4;
        }

        .circle-1 {
            top: 12%;
            right: 20%;
            width: 80px;
            height: 80px;
            animation: rotateSlow 10s linear infinite;
        }

        .circle-2 {
            bottom: 25%;
            left: 10%;
            width: 60px;
            height: 60px;
            animation: rotateSlow 10s linear infinite reverse;
        }

        @keyframes rotateSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 手绘爱心 */
        .hand-drawn-heart {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            opacity: 0.5;
        }

        .heart-1 {
            top: 70%;
            left: 5%;
            width: 30px;
            height: 30px;
            animation: heartbeat 2s ease-in-out infinite;
        }

        .heart-2 {
            top: 18%;
            right: 5%;
            width: 25px;
            height: 25px;
            animation: heartbeat 2s ease-in-out infinite 0.5s;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }

        /* 3D场景容器 */
        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            z-index: 2;
        }

        /* 3D旋转容器 */
        #carousel {
            position: absolute;
            top: 52%;
            left: 50%;
            width: 0;
            height: 0;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* 卡片样式 */
        .card {
            position: absolute;
            width: 100px;
            height: 140px;
            left: -50px;
            top: -70px;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0, 44, 205, 0.15);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            transform-style: preserve-3d;
            pointer-events: auto;
        }

        .card:hover {
            box-shadow: 0 15px 50px rgba(0, 44, 205, 0.3), 0 0 0 3px var(--accent);
            z-index: 1000 !important;
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 14px;
            font-weight: 600;
        }

        /* 中央按钮 */
        #center-btn {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 60px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(58, 134, 197, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            z-index: 50;
            line-height: 1;
            padding: 0 30px;
            white-space: nowrap;
            overflow: hidden;
            animation: btnPulse 3s ease-in-out infinite;
        }

        @keyframes btnPulse {
            0%, 100% { 
                box-shadow: 0 8px 32px rgba(58, 134, 197, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.6);
                transform: translateX(-50%) scale(1);
            }
            50% { 
                box-shadow: 0 12px 40px rgba(58, 134, 197, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.8);
                transform: translateX(-50%) scale(1.02);
            }
        }

        #center-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.6s ease;
        }

        #center-btn:hover::before {
            left: 100%;
        }

        #center-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 12px 40px rgba(58, 134, 197, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            animation: none;
            transform: translateX(-50%) scale(1.05);
        }

        #center-btn.clicked {
            animation: btnDisappear 0.8s ease forwards;
        }

        @keyframes btnDisappear {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }

        /* 底部文字 */
        #footer-text {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--black);
            font-size: 14px;
            opacity: 0.6;
            z-index: 10;
        }

        /* 过渡动画 */
        .fade-out {
            animation: fadeOut 1s ease forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        .card.scatter {
            animation: scatter 1s ease forwards;
        }

        @keyframes scatter {
            to {
                transform: translateZ(1000px) rotateY(720deg) scale(0);
                opacity: 0;
            }
        }

        /* 图片放大查看 */
        #image-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        #image-viewer.active {
            opacity: 1;
            visibility: visible;
        }

        #image-viewer img {
            max-width: 80%;
            max-height: 80%;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 44, 205, 0.3);
        }

        #image-viewer .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #image-viewer .close-btn:hover {
            transform: scale(1.1);
            background: var(--primary-light);
        }

        /* 加载动画 */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            transition: opacity 0.5s ease;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--accent-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loader p {
            margin-top: 20px;
            color: var(--primary);
            font-size: 16px;
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div id="loader">
        <div class="loader-spinner"></div>
        <p>加载中...</p>
    </div>

    <!-- 光晕背景 -->
    <div class="glow-effect"></div>
    <div class="glow-effect"></div>

    <!-- 粒子画布 -->
    <canvas id="particles-canvas"></canvas>

    <!-- 手绘风格星星 -->
    <div class="hand-drawn-star star-1">
        <svg viewBox="0 0 40 40">
            <path d="M20 5 L23 15 L33 15 L25 22 L28 32 L20 25 L12 32 L15 22 L7 15 L17 15 Z"/>
        </svg>
    </div>
    <div class="hand-drawn-star star-2">
        <svg viewBox="0 0 30 30">
            <path d="M15 3 L17 11 L25 11 L19 16 L21 24 L15 19 L9 24 L11 16 L5 11 L13 11 Z"/>
        </svg>
    </div>
    <div class="hand-drawn-star star-3">
        <svg viewBox="0 0 35 35">
            <path d="M17.5 5 L20 13 L28 13 L21.5 18.5 L24 26.5 L17.5 21 L11 26.5 L13.5 18.5 L7 13 L15 13 Z"/>
        </svg>
    </div>
    <div class="hand-drawn-star star-4">
        <svg viewBox="0 0 25 25">
            <path d="M12.5 3 L14 9 L20 9 L15 13 L16.5 19 L12.5 15 L8.5 19 L10 13 L5 9 L11 9 Z"/>
        </svg>
    </div>

    <!-- 手绘波浪线 -->
    <div class="hand-drawn-wave wave-1">
        <svg viewBox="0 0 200 60" width="100%" height="100%">
            <path d="M0 30 Q25 10 50 30 T100 30 T150 30 T200 30" fill="none" stroke="#73B4E9" stroke-width="2" stroke-linecap="round"/>
            <path d="M0 40 Q25 20 50 40 T100 40 T150 40 T200 40" fill="none" stroke="#C2DEF5" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </div>
    <div class="hand-drawn-wave wave-2">
        <svg viewBox="0 0 180 50" width="100%" height="100%">
            <path d="M0 25 Q22.5 8 45 25 T90 25 T135 25 T180 25" fill="none" stroke="#73B4E9" stroke-width="2" stroke-linecap="round"/>
            <path d="M0 35 Q22.5 18 45 35 T90 35 T135 35 T180 35" fill="none" stroke="#C2DEF5" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </div>

    <!-- 手绘圆圈 -->
    <div class="hand-drawn-circle circle-1"></div>
    <div class="hand-drawn-circle circle-2"></div>

    <!-- 手绘爱心 -->
    <div class="hand-drawn-heart heart-1">
        <svg viewBox="0 0 30 30" width="100%" height="100%">
            <path d="M15 25 C15 25 5 18 5 12 C5 8 8 5 12 5 C14 5 15 7 15 7 C15 7 16 5 18 5 C22 5 25 8 25 12 C25 18 15 25 15 25 Z" fill="none" stroke="#3A86C5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <div class="hand-drawn-heart heart-2">
        <svg viewBox="0 0 25 25" width="100%" height="100%">
            <path d="M12.5 21 C12.5 21 4 15 4 10 C4 6.5 6.5 4 10 4 C11.5 4 12.5 5.5 12.5 5.5 C12.5 5.5 13.5 4 15 4 C18.5 4 21 6.5 21 10 C21 15 12.5 21 12.5 21 Z" fill="none" stroke="#73B4E9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <!-- 3D场景 -->
    <div id="scene-container">
        <div id="carousel"></div>
        <div id="center-btn">欢迎回到RTTT</div>
    </div>

    <!-- 底部文字 -->
    <div id="footer-text">For Luzhou，From 橘子suuoia_Lu</div>

    <!-- 图片查看器 -->
    <div id="image-viewer" onclick="closeImageViewer(event)">
        <div class="close-btn" onclick="closeImageViewer()">&times;</div>
        <img id="viewer-img" src="" alt="">
    </div>

    <script>
        // 配置
        const CONFIG = {
            cardCount: 30,          // 卡片数量
            radius: 520,            // 环形半径（适中间隔）
            rotationSpeed: 0.0003,  // 自动旋转速度 (30秒一圈)
            mouseSensitivity: 0.001 // 鼠标灵敏度
        };

        // 状态
        let state = {
            rotationY: 0,
            targetRotationY: 0,
            isAutoRotating: true,
            mouseX: 0,
            mouseY: 0
        };

        // 统一使用单张图片
        const defaultImage = 'images/cards/card.jpg';

        // 初始化
        function init() {
            createCards();
            setupEventListeners();
            animate();

            // 隐藏加载动画
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 1000);
        }

        // 创建卡片
        function createCards() {
            const carousel = document.getElementById('carousel');
            const angleStep = 360 / CONFIG.cardCount;

            for (let i = 0; i < CONFIG.cardCount; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = i;

                // 创建图片元素
                const img = document.createElement('img');
                img.src = defaultImage;
                img.alt = `卡片 ${i + 1}`;
                img.loading = 'lazy';
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.onerror = function() {
                    // 图片加载失败时显示占位符
                    this.style.display = 'none';
                    const placeholder = document.createElement('div');
                    placeholder.className = 'card-placeholder';
                    placeholder.textContent = `卡片 ${i + 1}`;
                    card.appendChild(placeholder);
                };
                card.appendChild(img);

                // 计算3D位置
                const angle = angleStep * i;
                const radian = (angle * Math.PI) / 180;
                const x = Math.sin(radian) * CONFIG.radius;
                const z = Math.cos(radian) * CONFIG.radius;

                card.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${angle}deg)`;

                // 点击事件 - 暂停旋转并显示图片
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // 暂停自动旋转
                    state.isAutoRotating = false;
                    showImage(defaultImage);
                });

                carousel.appendChild(card);
            }
        }

        // 设置事件监听
        function setupEventListeners() {
            let isDragging = false;
            let startX = 0;
            let currentRotation = 0;

            // 鼠标按下 - 开始拖动
            document.addEventListener('mousedown', (e) => {
                if (e.target.closest('.card') || e.target.closest('#center-btn')) return;
                isDragging = true;
                startX = e.clientX;
                currentRotation = state.targetRotationY;
                document.body.style.cursor = 'grabbing';
            });

            // 鼠标移动 - 拖动旋转
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaX = e.clientX - startX;
                state.targetRotationY = currentRotation + deltaX * 0.5;
            });

            // 鼠标释放 - 停止拖动
            document.addEventListener('mouseup', () => {
                isDragging = false;
                document.body.style.cursor = 'default';
            });

            // 鼠标离开窗口 - 停止拖动
            document.addEventListener('mouseleave', () => {
                isDragging = false;
                document.body.style.cursor = 'default';
            });

            // 中央按钮点击
            document.getElementById('center-btn').addEventListener('click', transitionToHome);

            // 触摸设备支持
            let touchStartX = 0;
            let touchCurrentRotation = 0;

            document.addEventListener('touchstart', (e) => {
                if (e.target.closest('.card') || e.target.closest('#center-btn')) return;
                touchStartX = e.touches[0].clientX;
                touchCurrentRotation = state.targetRotationY;
            });

            document.addEventListener('touchmove', (e) => {
                const touchX = e.touches[0].clientX;
                const diff = (touchX - touchStartX) * 0.5;
                state.targetRotationY = touchCurrentRotation + diff;
            });
        }

        // 动画循环
        function animate() {
            const carousel = document.getElementById('carousel');

            // 自动旋转
            if (state.isAutoRotating) {
                state.rotationY += CONFIG.rotationSpeed * 16; // 约30秒一圈
            }

            // 鼠标交互平滑过渡
            const currentRotationY = state.rotationY + state.targetRotationY;

            carousel.style.transform = `rotateY(${currentRotationY}deg)`;

            requestAnimationFrame(animate);
        }

        // 显示图片
        function showImage(src) {
            const viewer = document.getElementById('image-viewer');
            const img = document.getElementById('viewer-img');

            // 显示真实图片
            img.src = src;

            viewer.classList.add('active');
        }

        // 关闭图片查看器
        function closeImageViewer(e) {
            if (e && e.target !== e.currentTarget && !e.target.classList.contains('close-btn')) {
                return;
            }
            document.getElementById('image-viewer').classList.remove('active');
            // 恢复自动旋转
            state.isAutoRotating = true;
        }

        // 过渡到首页
        function transitionToHome() {
            const btn = document.getElementById('center-btn');
            const cards = document.querySelectorAll('.card');
            const container = document.getElementById('scene-container');

            // 停止自动旋转
            state.isAutoRotating = false;

            // 按钮消失动画
            btn.classList.add('clicked');

            // 卡片散开动画
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('scatter');
                }, index * 30);
            });

            // 页面淡出
            setTimeout(() => {
                container.classList.add('fade-out');
            }, 300);

            // 跳转到首页
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1200);
        }

        // 粒子系统
        function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const particleCount = 50;

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 3 + 1;
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.speedY = (Math.random() - 0.5) * 0.5;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }

                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;

                    if (this.x > canvas.width) this.x = 0;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.y > canvas.height) this.y = 0;
                    if (this.y < 0) this.y = canvas.height;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(115, 180, 233, ${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach(particle => {
                    particle.update();
                    particle.draw();
                });

                // 绘制连线
                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < 150) {
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(115, 180, 233, ${0.2 * (1 - distance / 150)})`;
                            ctx.lineWidth = 1;
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    });
                });

                requestAnimationFrame(animateParticles);
            }

            animateParticles();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // 启动粒子系统
        initParticles();

        // 启动
        init();
    </script>
</body>
</html>
