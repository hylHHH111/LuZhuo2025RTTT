                    {
                        title: '造型A',
                        cover: 'assets/images/day2-style1.jpg',
                        children: [
                            { title: '舞台照1', image: 'assets/images/hefei/day2-1.jpg', thumb: 'assets/images/hefei/day2-1-thumb.jpg', isLeaf: true },
                            { title: '舞台照2', image: 'assets/images/hefei/day2-2.jpg', thumb: 'assets/images/hefei/day2-2-thumb.jpg', isLeaf: true },
                            { title: '舞台照3', image: 'assets/images/hefei/day2-3.jpg', thumb: 'assets/images/hefei/day2-3-thumb.jpg', isLeaf: true }
                        ]
                    },
                    {
                        title: '造型B',
                        cover: 'assets/images/day2-style2.jpg',
                        children: [
                            { title: '舞台照1', image: 'assets/images/hefei/day2-4.jpg', thumb: 'assets/images/hefei/day2-4-thumb.jpg', isLeaf: true },
                            { title: '舞台照2', image: 'assets/images/hefei/day2-5.jpg', thumb: 'assets/images/hefei/day2-5-thumb.jpg', isLeaf: true }
                        ]
                    }
                ]
            }
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initVideoPlayer();
            initBackToTop();
        });
        
        function initVideoPlayer() {
            const videoContainer = document.getElementById('documentaryVideo');
            if (videoContainer && typeof createVideoPlayer === 'function') {
                createVideoPlayer('documentaryVideo', {
                    src: 'assets/videos/hefei/documentary.mp4',
                    poster: 'assets/images/hefei/doc-poster.jpg',
                    title: '合肥站纪录片'
                });
            }
        }
        
        function initBackToTop() {
            const backToTop = document.getElementById('backToTop');
            if (!backToTop) return;
            window.addEventListener('scroll', function() {
                if (window.scrollY > 500) {
                    backToTop.classList.add('visible');
                } else {
                    backToTop.classList.remove('visible');
                }
            });
        }
        
        function toggleMobileMenu() {
            const navbarNav = document.getElementById('navbarNav');
            navbarNav?.classList.toggle('active');
        }
        
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function openGroupPhotoModal() {
            // 合照区：前5张为10月10日，后5张为10月11日，直接在一页显示
            const groupPhotoData = navData.groupPhoto.map((img, i) => ({
                title: i < 5 ? `10月10日合照 ${i + 1}` : `10月11日合照 ${i - 4}`,
                image: img,
                thumb: img,
                isLeaf: true
            }));
            cardAlbum.openModal('合照区', groupPhotoData, 0);
        }
        
        function openBouquetModal() {
            cardAlbum.openNavModal('花束区', navData.bouquet);
        }
        
        function openOfficialModal() {
            cardAlbum.openModal('官摄区', navData.official, 0);
        }
        
        function openPosterModal() {
            cardAlbum.openPosterModal('海报花絮', posterData);
        }
        
        function openFancamModal(day) {
            if (day === 'day1') {
                cardAlbum.openModal('Day 1 直拍', fancamData[0].children, 0);
            } else {
                cardAlbum.openModal('Day 2 直拍', fancamData[1].children, 0);
            }
        }
        
        // 打开定妆照弹窗
        function openStylingModal() {
            cardAlbum.openModal('定妆照', stylingData, 0);
        }
        
        function openGalleryModal(type) {
            let data, title;
            switch(type) {
                case 'day1':
                    title = 'Day 1 图集';
                    data = galleryData[0].children;
                    break;
                case 'day2':
                    title = 'Day 2 图集';
                    data = galleryData[1].children;
                    break;
            }
            cardAlbum.openModal(title, data, 0);
        }
        
        // 播放视频
        function playVideo(videoUrl, title) {
            const modal = document.createElement('div');
            modal.className = 'video-modal';
            modal.innerHTML = `
                <div class="video-modal-overlay" onclick="closeVideoModal()"></div>
                <div class="video-modal-content">
                    <button class="video-modal-close" onclick="closeVideoModal()">×</button>
                    <h3 class="video-modal-title">${title}</h3>
                    <div class="video-iframe-container">
                        <iframe src="${videoUrl}" 
                            frameborder="0" 
                            scrolling="no" 
                            allowfullscreen>
                        </iframe>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';
        }
        
        // 关闭视频弹窗
        function closeVideoModal() {
            const modal = document.querySelector('.video-modal');
            if (modal) {
                modal.remove();
                document.body.style.overflow = '';
            }
        }
        
        // 打开纪录片弹窗
        function openDocumentaryModal() {
            playVideo('https://weibo.com/tv/show/1034:5226437192646763?from=old_pc_videoshow', '合肥站纪录片');
        }
        
        // 打开海报信封区弹窗
        function openPosterNavModal() {
            // 海报信封区：自定义名称，将成都站手写信改为合肥站手写信
            const posterTitles = ['手写信信封', '合肥站手写信', '主海报', '倒计时3天', '倒计时2天', '倒计时1天'];
            const posterData = navData.poster.map((img, i) => ({
                title: posterTitles[i] || `图片 ${i + 1}`,
                image: img,
                thumb: img,
                isLeaf: true
            }));
            cardAlbum.openModal('海报信封区', posterData, 0);
        }
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.getElementById('navbarNav')?.classList.remove('active');
            });
        });
    </script>
    <script src="js/music.js"></script>
</body>
</html>
