<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舞台直拍 - 鹭卓2025 RTTT巡演</title>
    <link rel="stylesheet" href="css/variables.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-family); background: var(--white); color: var(--text-primary); line-height: 1.6; }
        .navbar { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-height); background: var(--nav-bg); z-index: 1000; box-shadow: var(--shadow-md); }
        .navbar-container { max-width: 1400px; margin: 0 auto; padding: 0 var(--space-lg); height: 100%; display: flex; align-items: center; justify-content: space-between; }
        .navbar-logo { font-size: var(--font-size-xl); font-weight: 700; color: var(--white); text-decoration: none; }
        .navbar-nav { display: flex; gap: var(--space-xs); }
        .nav-item { padding: var(--space-sm) var(--space-md); color: var(--white); text-decoration: none; font-size: var(--font-size-base); font-weight: 500; border-radius: var(--radius-md); transition: all var(--transition-fast); position: relative; }
        .nav-item:hover { color: var(--accent-light); background: rgba(255,255,255,0.1); }
        .nav-item.active { color: var(--white); }
        .nav-item.active::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: var(--white); border-radius: var(--radius-full); }
        .navbar-toggle { display: none; flex-direction: column; gap: 5px; padding: var(--space-sm); background: none; border: none; cursor: pointer; }
        .navbar-toggle span { display: block; width: 24px; height: 2px; background: var(--white); }
        .main-content { padding-top: var(--nav-height); }
        
        /* 页面头部 */
        .stage-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--white);
            padding: calc(var(--nav-height) + var(--space-2xl)) var(--space-lg) var(--space-2xl);
            text-align: center;
        }
        .stage-title {
            font-size: var(--font-size-3xl);
            font-weight: 700;
            margin-bottom: var(--space-xl);
        }
        
        /* 搜索框 */
        .search-container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: var(--space-md) var(--space-xl);
            padding-left: 50px;
            font-size: var(--font-size-base);
            border: 2px solid var(--accent);
            border-radius: var(--radius-full);
            background: var(--white);
            color: var(--text-primary);
            outline: none;
            transition: all var(--transition-fast);
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(91, 164, 201, 0.15);
        }
        .search-icon {
            position: absolute;
            left: var(--space-lg);
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: var(--font-size-lg);
        }
        
        /* 内容区域 */
        .content-section {
            padding: var(--space-3xl) var(--space-lg);
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 歌曲分类 */
        .song-section {
            margin-bottom: var(--space-3xl);
        }
        .song-header {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
            padding-bottom: var(--space-md);
            border-bottom: 2px solid var(--accent-light);
        }
        .song-name {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--primary);
        }
        .song-count {
            padding: var(--space-xs) var(--space-md);
            background: var(--accent-light);
            color: var(--primary);
            border-radius: var(--radius-full);
            font-size: var(--font-size-sm);
            font-weight: 600;
        }
        
        /* 视频网格 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-xl);
        }
        .video-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
            cursor: pointer;
        }
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        .video-thumbnail {
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .video-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        .video-thumbnail::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
            transition: all var(--transition-base);
        }
        .video-card:hover .video-thumbnail::before {
            background: rgba(0, 0, 0, 0.1);
        }

        .video-info {
            padding: var(--space-md) var(--space-lg);
        }
        .video-title {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: var(--space-xs);
        }
        .video-city {
            font-size: var(--font-size-sm);
            color: var(--accent);
        }
        
        /* 无结果提示 */
        .no-results {
            text-align: center;
            padding: var(--space-3xl);
            color: var(--text-secondary);
        }
        
        /* 页脚 */
        .footer {
            background: var(--primary);
            color: var(--white);
            padding: var(--space-2xl) var(--space-lg);
            text-align: center;
        }
        
        /* 回到顶部 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-base);
            z-index: 999;
            font-size: 20px;
        }
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        /* 播放按钮 */
        .play-icon {
            position: relative;
            z-index: 2;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 24px;
            transition: all var(--transition-base);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .video-card:hover .play-icon {
            transform: scale(1.15);
            background: var(--white);
        }
        .video-thumbnail::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            transition: background var(--transition-base);
        }
        .video-card:hover .video-thumbnail::after {
            background: rgba(0, 0, 0, 0.1);
        }

        /* 视频弹窗 */
        .video-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
        }
        .video-modal-content {
            position: relative;
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            max-width: 900px;
            width: 90%;
            max-height: 90vh;
            overflow: auto;
            z-index: 2001;
        }
        .video-modal-close {
            position: absolute;
            top: var(--space-md);
            right: var(--space-md);
            width: 40px;
            height: 40px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            z-index: 2002;
        }
        .video-modal-close:hover {
            background: var(--primary-light);
            transform: rotate(90deg);
        }
        .video-modal-title {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--primary);
            margin-bottom: var(--space-lg);
            padding-right: 50px;
        }
        .video-iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: var(--radius-md);
            background: #000;
        }
        .video-iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .navbar-nav {
                position: fixed;
                top: var(--nav-height);
                left: 0; right: 0;
                background: var(--nav-bg);
                flex-direction: column;
                padding: var(--space-md);
                transform: translateY(-100%);
                opacity: 0;
                visibility: hidden;
                transition: all var(--transition-base);
            }
            .navbar-nav.active {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }
            .navbar-toggle {
                display: flex;
            }
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
            .stage-title {
                font-size: var(--font-size-2xl);
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="home.html" class="navbar-logo">鹭卓2025RTTT巡演记录</a>
            <div class="navbar-nav" id="navbarNav">
                <a href="home.html" class="nav-item">首页</a>
                <a href="chengdu.html" class="nav-item">成都站</a>
                <a href="hefei.html" class="nav-item">合肥站</a>
                <a href="taiyuan.html" class="nav-item">太原站</a>
                <a href="beijing.html" class="nav-item">北京站</a>
                <a href="nanjing.html" class="nav-item">南京站</a>
                <a href="stage.html" class="nav-item active">舞台直拍</a>
            </div>
            <button class="navbar-toggle" onclick="toggleMobileMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 页面头部 -->
        <section class="stage-header">
            <h1 class="stage-title">舞台直拍合集</h1>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索歌曲名称..." oninput="searchSongs(this.value)">
            </div>
        </section>

        <!-- 歌曲列表 -->
        <section class="content-section" id="songsContainer">
            <!-- 动态生成 -->
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>鹭卓2025 RTTT巡演记录 | For Luzhou，From 橘子suuoia_Lu</p>
    </footer>

    <!-- 回到顶部 -->
    <div class="back-to-top" id="backToTop" onclick="scrollToTop()">↑</div>

    <script>
        // 歌曲数据
        const songsData = [
            {
                id: 'opening',
                name: '开场秀',
                videos: [
                    { city: '成都', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '开场秀 - 成都站' },
                    { city: '合肥', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '开场秀 - 合肥站' },
                    { city: '北京', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '开场秀 - 北京站' }
                ]
            },
            {
                id: 'song1',
                name: '主题曲 RTTT',
                videos: [
                    { city: '成都', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: 'RTTT - 成都站' },
                    { city: '太原', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: 'RTTT - 太原站' },
                    { city: '南京', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: 'RTTT - 南京站' }
                ]
            },
            {
                id: 'song2',
                name: '热门单曲',
                videos: [
                    { city: '成都', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '热门单曲 - 成都站' },
                    { city: '合肥', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '热门单曲 - 合肥站' },
                    { city: '北京', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '热门单曲 - 北京站' },
                    { city: '南京', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '热门单曲 - 南京站' }
                ]
            },
            {
                id: 'ballad',
                name: '抒情慢歌',
                videos: [
                    { city: '成都', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '抒情慢歌 - 成都站' },
                    { city: '太原', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '抒情慢歌 - 太原站' }
                ]
            },
            {
                id: 'dance',
                name: '舞曲串烧',
                videos: [
                    { city: '成都', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '舞曲串烧 - 成都站' },
                    { city: '合肥', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '舞曲串烧 - 合肥站' },
                    { city: '南京', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '舞曲串烧 - 南京站' }
                ]
            },
            {
                id: 'encore',
                name: '安可曲',
                videos: [
                    { city: '北京', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '安可曲 - 北京站' },
                    { city: '南京', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051?from=weibolite', coverUrl: 'images/covers/kaicb.jpg', title: '安可曲 - 南京站' }
                ]
            }
        ];

        // 生成渐变封面图
        function generateCoverImage(title, city) {
            const canvas = document.createElement('canvas');
            canvas.width = 400;
            canvas.height = 225;
            const ctx = canvas.getContext('2d');

            // 创建渐变背景 - 新配色
            const gradient = ctx.createLinearGradient(0, 0, 400, 225);
            gradient.addColorStop(0, '#3A86C5');
            gradient.addColorStop(1, '#73B4E9');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 400, 225);

            // 添加装饰圆形
            ctx.beginPath();
            ctx.arc(350, 50, 80, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(50, 180, 60, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fill();

            // 添加文字
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 24px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(title.split(' - ')[0], 200, 100);

            ctx.font = '18px Arial, sans-serif';
            ctx.fillStyle = '#C2DEF5';
            ctx.fillText(city + '站', 200, 140);
            
            return canvas.toDataURL('image/jpeg', 0.9);
        }

        // 初始化
        function init() {
            renderSongs(songsData);
        }

        // 渲染歌曲列表
        function renderSongs(songs) {
            const container = document.getElementById('songsContainer');
            
            if (songs.length === 0) {
                container.innerHTML = '<div class="no-results">未找到匹配的歌曲</div>';
                return;
            }
            
            container.innerHTML = songs.map(song => `
                <div class="song-section" id="song-${song.id}">
                    <div class="song-header">
                        <h2 class="song-name">${song.name}</h2>
                        <span class="song-count">${song.videos.length} 个版本</span>
                    </div>
                    <div class="video-grid">
                        ${song.videos.map(video => {
                            // 优先使用本地图片，如果没有则使用动态生成的封面
                            const coverSrc = video.coverUrl || generateCoverImage(video.title, video.city);
                            return `
                            <div class="video-card" onclick="playVideo('${video.videoUrl}', '${video.title}')">
                                <div class="video-thumbnail">
                                    <img src="${coverSrc}" alt="${video.title}" loading="lazy" onerror="this.src='${generateCoverImage(video.title, video.city)}'">
                                    <div class="play-icon">▶</div>
                                </div>
                                <div class="video-info">
                                    <div class="video-title">${video.title}</div>
                                    <div class="video-city">${video.city}站</div>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 搜索功能
        function searchSongs(query) {
            const filtered = query 
                ? songsData.filter(song => song.name.toLowerCase().includes(query.toLowerCase()))
                : songsData;
            renderSongs(filtered);
            
            // 高亮并滚动到第一个结果
            if (query && filtered.length > 0) {
                const firstSong = document.querySelector('.song-section');
                if (firstSong) {
                    firstSong.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        // 播放视频
        function playVideo(videoUrl, title) {
            const modal = document.createElement('div');
            modal.className = 'video-modal';
            modal.innerHTML = `
                <div class="video-modal-overlay" onclick="closeVideoModal()"></div>
                <div class="video-modal-content">
                    <button class="video-modal-close" onclick="closeVideoModal()">×</button>
                    <h3 class="video-modal-title">${title}</h3>
                    <div class="video-iframe-container">
                        <iframe src="${videoUrl}" 
                            frameborder="0" 
                            scrolling="no" 
                            allowfullscreen>
                        </iframe>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';
        }

        // 关闭视频弹窗
        function closeVideoModal() {
            const modal = document.querySelector('.video-modal');
            if (modal) {
                modal.remove();
                document.body.style.overflow = '';
            }
        }

        // 切换移动端菜单
        function toggleMobileMenu() {
            document.getElementById('navbarNav').classList.toggle('active');
        }

        // 回到顶部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 显示/隐藏回到顶部按钮
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            btn.classList.toggle('visible', window.scrollY > 500);
        });

        // 启动
        init();
    </script>
    <script src="js/music.js"></script>
</body>
</html>
