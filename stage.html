<head>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/city-page.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-family); background: var(--white); color: var(--text-primary); line-height: 1.6; }
        
        /* 页面头部 */
        .stage-header {
            background: url('images/stage/stage_header.webp') center/cover no-repeat;
            color: var(--white);
            padding: calc(var(--nav-height) + var(--space-3xl)) var(--space-lg) var(--space-3xl);
            text-align: center;
            position: relative;
            min-height: 350px;
            z-index: 1;
        }
        .stage-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }
        .stage-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(to top, rgba(255, 255, 255, 1) 0%, transparent 100%);
            pointer-events: none;
            z-index: 2;
        }
        .stage-header > * {
            position: relative;
            z-index: auto;
        }
        .stage-title {
            font-size: var(--font-size-3xl);
            font-weight: 700;
            margin-bottom: var(--space-xl);
        }
        
        /* 搜索框 */
        .search-container {
            max-width: 350px;
            margin: 0 auto;
            position: relative;
            margin-top: 80px;
        }
        .search-input {
            width: 100%;
            padding: var(--space-md) var(--space-xl);
            padding-left: 50px;
            font-size: var(--font-size-base);
            border: 2px solid #e0e0e0;
            border-radius: var(--radius-full);
            background: var(--white);
            color: var(--text-primary);
            outline: none;
            transition: all var(--transition-fast);
        }
        .search-input:focus {
            border-color: #999;
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.08);
        }
        .search-icon {
            position: absolute;
            left: var(--space-lg);
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: var(--font-size-lg);
        }
        
        /* 内容区域 */
        .content-section {
            padding: var(--space-3xl) var(--space-lg);
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 分类区域 */
        .category-section {
            margin-bottom: var(--space-3xl);
        }
        .category-header {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
            padding-bottom: var(--space-md);
            border-bottom: 2px solid var(--accent-light);
        }
        .category-name {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--primary);
        }
        .category-count {
            padding: var(--space-xs) var(--space-md);
            background: var(--accent-light);
            color: var(--primary);
            border-radius: var(--radius-full);
            font-size: var(--font-size-sm);
            font-weight: 600;
        }
        
        /* 歌曲卡册网格 */
        .song-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: var(--space-md);
        }
        
        /* 歌曲卡片 */
        .song-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
            cursor: pointer;
            border: 2px solid rgba(91, 164, 201, 0.2);
        }
        .song-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }
        .song-cover {
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .song-cover img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        .song-cover::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
            transition: all var(--transition-base);
        }
        .song-card:hover .song-cover::before {
            background: rgba(0, 0, 0, 0.1);
        }
        .song-cover-text {
            position: relative;
            z-index: 2;
            color: var(--white);
            font-size: var(--font-size-xl);
            font-weight: 700;
            text-align: center;
            padding: var(--space-md);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .song-info {
            padding: var(--space-sm) var(--space-xs);
            text-align: center;
        }
        .song-title {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 2px;
            font-size: var(--font-size-base);
            line-height: 1.3;
            white-space: pre-line;
        }
        .song-video-count {
            font-size: var(--font-size-xs);
            color: var(--accent);
            line-height: 1.3;
        }
        
        /* 无结果提示 */
        .no-results {
            text-align: center;
            padding: var(--space-3xl);
            color: var(--text-secondary);
            font-size: var(--font-size-lg);
        }
        
        /* 响应式 */
        @media (max-width: 1400px) {
            .song-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        @media (max-width: 1200px) {
            .song-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        @media (max-width: 992px) {
            .song-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 768px) {
            .song-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .stage-title {
                font-size: var(--font-size-2xl);
            }
        }
        @media (max-width: 480px) {
            .song-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 定位导航组件 */
        .nav-locator {
            position: fixed;
            right: 20px;
            bottom: 114px;
            z-index: 998;
        }
        .nav-locator-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            font-size: 18px;
            border: none;
        }
        .nav-locator-btn:hover {
            transform: scale(1.1);
        }
        .nav-locator-menu {
            position: absolute;
            right: 45px;
            bottom: 0;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 10px 0;
            min-width: 140px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            max-height: 400px;
            overflow-y: auto;
            z-index: 999;
        }
        .nav-locator:hover .nav-locator-menu {
            opacity: 1;
            visibility: visible;
        }
        .nav-category {
            position: static;
        }
        .nav-category-title {
            padding: 10px 16px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            position: relative;
        }
        .nav-category-title:hover {
            background: var(--accent-light);
        }
        .nav-songs-list {
            position: fixed;
            right: 200px;
            bottom: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 8px 0;
            min-width: 160px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            max-height: calc(100vh - 150px);
            overflow-y: auto;
            z-index: 1001;
        }
        .nav-category:hover .nav-songs-list {
            opacity: 1;
            visibility: visible;
        }
        .nav-song-item {
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            font-size: 14px;
            color: var(--text-primary);
        }
        .nav-song-item:hover {
            background: var(--accent-light);
            color: var(--primary);
        }
        .nav-song-item:active {
            background: var(--accent-light);
            color: var(--primary);
        }
        /* 移动端样式 */
        @media (max-width: 768px) {
            .stage-header {
                z-index: auto;
            }
            .navbar {
                position: fixed !important;
                z-index: 99999 !important;
            }
            .navbar-nav {
                z-index: 100000 !important;
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 5px !important;
                width: 290px !important;
                padding: 45px 15px 15px !important;
            }
            .navbar-nav .nav-item {
                text-align: center !important;
                background: transparent !important;
                border-radius: 8px !important;
                padding: 2px 0px !important;
            }
            .nav-locator {
                bottom: 115px;
            }
            .nav-locator.active .nav-locator-menu {
                display: block;
            }
            .nav-locator-menu {
                right: 45px;
                bottom: 0;
                width: 180px;
                max-height: 300px;
                display: none;
                opacity: 1;
                visibility: visible;
            }
            .nav-category {
                position: relative;
            }
            .nav-songs-list {
                position: static;
                display: none;
                max-height: 170px;
                margin: 5px 10px;
                background: #fff;
                border-radius: 12px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.15);
                opacity: 1;
                visibility: visible;
                width: 160px;
                box-sizing: border-box;
            }
            .nav-songs-list.show {
                display: block;
            }
        }
    </style>
</head>

            ctx.fill();

            ctx.beginPath();
            ctx.arc(50, 320, 40, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fill();

            // 添加文字
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 28px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(title, 150, 200);
            
            return canvas.toDataURL('image/jpeg', 0.9);
        }

        // 初始化
        function init() {
            renderCategories();
            renderNavLocator();
        }

        // 渲染定位导航菜单
        function renderNavLocator() {
            const menu = document.getElementById('navLocatorMenu');
            
            menu.innerHTML = stageData.map(category => `
                <div class="nav-category" data-category="${category.id}">
                    <div class="nav-category-title" data-action="toggle" data-category-id="${category.id}">${category.name}</div>
                    <div class="nav-songs-list" id="songs-${category.id}">
                        ${category.songs.map(song => `
                            <div class="nav-song-item" data-action="scroll" data-category-id="${category.id}" data-song-id="${song.id}">${song.name}</div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 滚动时自动关闭移动端导航栏
        let lastScrollY = window.scrollY;
        window.addEventListener('scroll', function() {
            const navbarNav = document.getElementById('navbarNav');
            if (navbarNav && navbarNav.classList.contains('active')) {
                // 滚动超过一定距离时关闭导航栏
                if (Math.abs(window.scrollY - lastScrollY) > 5) {
                    navbarNav.classList.remove('active');
                }
            }
            lastScrollY = window.scrollY;
        }, { passive: true });
        
        // 绑定定位导航事件（使用事件委托）
        document.addEventListener('click', function(e) {
            const locator = document.getElementById('navLocator');
            const locatorBtn = document.querySelector('.nav-locator-btn');
            
            // 点击定位按钮
            if (e.target === locatorBtn || locatorBtn.contains(e.target)) {
                e.preventDefault();
                e.stopPropagation();
                locator.classList.toggle('active');
                return;
            }
            
            // 点击分类标题
            const categoryTitle = e.target.closest('.nav-category-title');
            if (categoryTitle && locator.contains(categoryTitle)) {
                e.preventDefault();
                e.stopPropagation();
                
                const categoryId = categoryTitle.dataset.categoryId;
                console.log('点击分类:', categoryId);
                
                const songsList = document.getElementById('songs-' + categoryId);
                console.log('找到歌曲列表:', songsList);
                if (!songsList) return;
                
                const isVisible = songsList.classList.contains('show');
                console.log('当前是否显示:', isVisible);
                
                // 先关闭所有其他歌曲列表
                document.querySelectorAll('.nav-songs-list').forEach(list => {
                    list.classList.remove('show');
                });
                
                // 切换当前列表
                if (!isVisible) {
                    songsList.classList.add('show');
                    console.log('已添加 show 类');
                }
                return;
            }
            
            // 点击歌曲
            const songItem = e.target.closest('.nav-song-item');
            if (songItem && locator.contains(songItem)) {
                e.preventDefault();
                e.stopPropagation();
                const categoryId = songItem.dataset.categoryId;
                const songId = songItem.dataset.songId;
                
                // 关闭菜单
                locator.classList.remove('active');
                document.querySelectorAll('.nav-songs-list').forEach(list => {
                    list.classList.remove('show');
                });
                
                // 滚动到歌曲
                scrollToSong(categoryId, songId);
                return;
            }
            
            // 点击其他地方关闭定位菜单和移动端导航栏
            const navbarNav = document.getElementById('navbarNav');
            const navbarToggle = document.querySelector('.navbar-toggle');
            const isClickInNavbar = navbarNav && (navbarNav.contains(e.target) || navbarToggle.contains(e.target));
            
            // 关闭定位菜单
            if (!locator.contains(e.target)) {
                locator.classList.remove('active');
                document.querySelectorAll('.nav-songs-list').forEach(list => {
                    list.classList.remove('show');
                });
            }
            
            // 关闭移动端导航栏（如果点击的不是导航栏区域）
            if (!isClickInNavbar && navbarNav && navbarNav.classList.contains('active')) {
                navbarNav.classList.remove('active');
            }
        });

        // 滚动到指定歌曲
        function scrollToSong(categoryId, songId) {
            const element = document.getElementById(`song-${categoryId}-${songId}`);
            if (element) {
                // 关闭定位导航菜单
                const locator = document.getElementById('navLocator');
                if (locator) {
                    locator.classList.remove('active');
                }
                document.querySelectorAll('.nav-songs-list').forEach(list => {
                    list.classList.remove('show');
                });
                
                // 滚动到歌曲位置
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 高亮显示歌曲卡片
                element.style.transition = 'all 0.3s ease';
                element.style.transform = 'scale(1.05)';
                element.style.boxShadow = '0 8px 25px rgba(91, 164, 201, 0.4)';
                setTimeout(() => {
                    element.style.transform = 'scale(1)';
                    element.style.boxShadow = '';
                }, 1500);
            }
        }

        // 渲染分类
        function renderCategories(filterText = '') {
            const container = document.getElementById('categoriesContainer');
            
            // 过滤数据
            let filteredData = stageData;
            if (filterText) {
                const lowerFilter = filterText.toLowerCase();
                filteredData = stageData.map(category => ({
                    ...category,
                    songs: category.songs.filter(song => 
                        song.name.toLowerCase().includes(lowerFilter)
                    )
                })).filter(category => category.songs.length > 0);
            }
            
            // 检查是否有结果
            const totalSongs = filteredData.reduce((sum, cat) => sum + cat.songs.length, 0);
            if (totalSongs === 0) {
                container.innerHTML = '<div class="no-results">未找到匹配的歌曲</div>';
                return;
            }
            
            container.innerHTML = filteredData.map(category => {
                const totalVideos = category.songs.reduce((sum, song) => sum + (song.videos ? song.videos.length : 0), 0);
                return `
                <div class="category-section" id="category-${category.id}">
                    <div class="category-header">
                        <h2 class="category-name">${category.name}</h2>
                        <span class="category-count">${category.songs.length} 首歌 · 共 ${totalVideos} 个视频</span>
                    </div>
                    <div class="song-grid">
                        ${category.songs.map(song => {
                            const hasCustomCover = !!song.cover;
                            const coverSrc = song.cover || generateCover(song.name);
                            const coverText = hasCustomCover ? '' : `<div class="song-cover-text">${song.name}</div>`;
                            return `
                            <div class="song-card" id="song-${category.id}-${song.id}" onclick="openSongVideos('${category.id}', '${song.id}')">
                                <div class="song-cover">
                                    <img src="${coverSrc}" alt="${song.name}" loading="lazy" onerror="this.src='${generateCover(song.name)}'">
                                    ${coverText}
                                </div>
                                <div class="song-info">
                                    <div class="song-title">${song.name}</div>
                                    <div class="song-video-count">${song.videos.length} 个视频</div>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                </div>
            `}).join('');
        }
        
        // 搜索功能
        function searchSongs(query) {
            renderCategories(query);
            
            // 高亮并滚动到第一个结果
            if (query) {
                const firstCategory = document.querySelector('.category-section');
                if (firstCategory) {
                    firstCategory.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }
        }

        // 打开歌曲视频
        function openSongVideos(categoryId, songId) {
            const category = stageData.find(c => c.id === categoryId);
            const song = category.songs.find(s => s.id === songId);
            
            // 如果只有一个视频，直接弹窗播放
            if (song.videos.length === 1) {
                cardAlbum.playVideo(song.videos[0].videoUrl, song.videos[0].title);
                return;
            }
            
            // 如果有多个视频，显示选择弹窗
            const videoData = song.videos.map((video, i) => ({
                title: video.title,
                image: song.cover || generateCover(song.name),
                thumb: song.cover || generateCover(song.name),
                videoUrl: video.videoUrl,
                isLeaf: true
            }));
            
            // 使用 cardAlbum 打开弹窗
            cardAlbum.openVideoModal(song.name, videoData);
        }

        // 切换移动端菜单
        function toggleMobileMenu() {
            document.getElementById('navbarNav').classList.toggle('active');
        }

        // 回到顶部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 显示/隐藏回到顶部按钮
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            btn.classList.toggle('visible', window.scrollY > 500);
        });

        // 启动
        init();
    </script>
    <script src="js/music.js"></script>
</body>
</html>
