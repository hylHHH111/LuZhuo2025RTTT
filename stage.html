<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舞台直拍 - 鹭卓2025 RTTT巡演</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/city-page.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-family); background: var(--white); color: var(--text-primary); line-height: 1.6; }
        
        /* 页面头部 */
        .stage-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--white);
            padding: calc(var(--nav-height) + var(--space-2xl)) var(--space-lg) var(--space-2xl);
            text-align: center;
        }
        .stage-title {
            font-size: var(--font-size-3xl);
            font-weight: 700;
            margin-bottom: var(--space-xl);
        }
        
        /* 搜索框 */
        .search-container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: var(--space-md) var(--space-xl);
            padding-left: 50px;
            font-size: var(--font-size-base);
            border: 2px solid var(--accent);
            border-radius: var(--radius-full);
            background: var(--white);
            color: var(--text-primary);
            outline: none;
            transition: all var(--transition-fast);
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(91, 164, 201, 0.15);
        }
        .search-icon {
            position: absolute;
            left: var(--space-lg);
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: var(--font-size-lg);
        }
        
        /* 内容区域 */
        .content-section {
            padding: var(--space-3xl) var(--space-lg);
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 分类区域 */
        .category-section {
            margin-bottom: var(--space-3xl);
        }
        .category-header {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
            padding-bottom: var(--space-md);
            border-bottom: 2px solid var(--accent-light);
        }
        .category-name {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--primary);
        }
        .category-count {
            padding: var(--space-xs) var(--space-md);
            background: var(--accent-light);
            color: var(--primary);
            border-radius: var(--radius-full);
            font-size: var(--font-size-sm);
            font-weight: 600;
        }
        
        /* 歌曲卡册网格 */
        .song-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-xl);
        }
        
        /* 歌曲卡片 */
        .song-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
            cursor: pointer;
            border: 2px solid rgba(91, 164, 201, 0.2);
        }
        .song-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }
        .song-cover {
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .song-cover img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        .song-cover::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
            transition: all var(--transition-base);
        }
        .song-card:hover .song-cover::before {
            background: rgba(0, 0, 0, 0.1);
        }
        .song-cover-text {
            position: relative;
            z-index: 2;
            color: var(--white);
            font-size: var(--font-size-xl);
            font-weight: 700;
            text-align: center;
            padding: var(--space-md);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .song-info {
            padding: var(--space-sm) var(--space-xs);
            text-align: center;
        }
        .song-title {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 2px;
            font-size: var(--font-size-base);
            line-height: 1.3;
        }
        .song-video-count {
            font-size: var(--font-size-xs);
            color: var(--accent);
            line-height: 1.3;
        }
        
        /* 无结果提示 */
        .no-results {
            text-align: center;
            padding: var(--space-3xl);
            color: var(--text-secondary);
            font-size: var(--font-size-lg);
        }
        
        /* 响应式 */
        @media (max-width: 1024px) {
            .song-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 768px) {
            .song-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .stage-title {
                font-size: var(--font-size-2xl);
            }
        }
        @media (max-width: 480px) {
            .song-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="home.html" class="navbar-logo">鹭卓2025RTTT巡演记录</a>
            <div class="navbar-nav" id="navbarNav">
                <a href="home.html" class="nav-item">首页</a>
                <a href="chengdu.html" class="nav-item">成都站</a>
                <a href="hefei.html" class="nav-item">合肥站</a>
                <a href="taiyuan.html" class="nav-item">太原站</a>
                <a href="beijing.html" class="nav-item">北京站</a>
                <a href="nanjing.html" class="nav-item">南京站</a>
                <a href="stage.html" class="nav-item active">舞台直拍</a>
            </div>
            <button class="navbar-toggle" onclick="toggleMobileMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content" style="padding-top: 0;">
        <!-- 页面头部 -->
        <section class="stage-header">
            <h1 class="stage-title">舞台直拍合集</h1>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索歌曲名称..." oninput="searchSongs(this.value)">
            </div>
        </section>

        <!-- 歌曲分类 -->
        <section class="content-section" id="categoriesContainer">
            <!-- 动态生成 -->
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p class="footer-text">鹭卓2025 RTTT巡演记录 | For Luzhou，From 橘子suuoia_Lu</p>
    </footer>

    <!-- 回到顶部 -->
    <button class="back-to-top" id="backToTop" onclick="scrollToTop()">↑</button>

    <script src="js/card-album.js"></script>
    <script>
        // 舞台直拍数据 - 三层级结构：分类 -> 歌曲 -> 视频
        const stageData = [
            {
                id: 'original',
                name: '原创歌曲',
                songs: [
                    {
                        id: 'bufenkai',
                        name: '不要分开',
                        cover: 'images/stage/byfk.webp',
                        videos: [
                            { videoUrl: 'https://www.xiaohongshu.com/explore/6905761c000000000703a273?xsec_token=AB170FekrpOO4PCd4B1XoRffTkOwpaVgRYGcahgvCdIds=&xsec_source=pc_user', title: '奇迹小冬' },
                            { videoUrl: 'https://www.xiaohongshu.com/explore/6907824f000000000301828c?xsec_token=ABldSoVF3_ozQevfp16ZH2wx6NF3JEduCpeKNSVBDH05s=&xsec_source=pc_user', title: 'Irradiaphilia_鹭卓' },
                            { videoUrl: 'https://www.xiaohongshu.com/explore/690b16ee0000000003037d8e?xsec_token=ABUu8o4vx2r_7LjUr72poOnNYpcohZtzqlafGMZFjpf1o=&xsec_source=pc_user', title: 'Fawnella_1124鹭卓' },
                            { videoUrl: 'https://weibo.com/tv/show/1034:5226116613341211?from=old_pc_videoshow', title: 'YEELEN丨鹭卓' },
                            { videoUrl: 'https://weibo.com/tv/show/1034:5226543518253070?from=old_pc_videoshow', title: 'LINA_1124' }
                        ]
                    },
                    {
                        id: 'yinji',
                        name: '印记',
                        cover: 'images/covers/yinji.jpg',
                        videos: [
                            { city: '成都', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051', title: '印记 - 成都站' },
                            { city: '合肥', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051', title: '印记 - 合肥站' },
                            { city: '南京', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051', title: '印记 - 南京站' }
                        ]
                    }
                ]
            },
            {
                id: 'single',
                name: '个人单曲',
                songs: [
                    {
                        id: 'ruguo',
                        name: '如果最后只剩我',
                        cover: 'images/covers/ruguo.jpg',
                        videos: [
                            { city: '成都', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051', title: '如果最后只剩我 - 成都站' },
                            { city: '合肥', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051', title: '如果最后只剩我 - 合肥站' },
                            { city: '北京', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051', title: '如果最后只剩我 - 北京站' },
                            { city: '南京', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051', title: '如果最后只剩我 - 南京站' }
                        ]
                    }
                ]
            },
            {
                id: 'request',
                name: '点歌环节',
                songs: [
                    {
                        id: 'meirenyu',
                        name: '美人鱼',
                        cover: 'images/covers/meirenyu.jpg',
                        videos: [
                            { city: '成都', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051', title: '美人鱼 - 成都站' },
                            { city: '合肥', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051', title: '美人鱼 - 合肥站' }
                        ]
                    },
                    {
                        id: 'diyici',
                        name: '第一次',
                        cover: 'images/covers/diyici.jpg',
                        videos: [
                            { city: '成都', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051', title: '第一次 - 成都站' },
                            { city: '北京', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051', title: '第一次 - 北京站' }
                        ]
                    },
                    {
                        id: 'nvhai',
                        name: '女孩',
                        cover: 'images/covers/nvhai.jpg',
                        videos: [
                            { city: '合肥', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051', title: '女孩 - 合肥站' },
                            { city: '南京', videoUrl: 'https://weibo.com/tv/show/1034:5236284294103051', title: '女孩 - 南京站' }
                        ]
                    }
                ]
            }
        ];

        // 生成封面图
        function generateCover(title) {
            const canvas = document.createElement('canvas');
            canvas.width = 300;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');

            // 创建渐变背景
            const gradient = ctx.createLinearGradient(0, 0, 300, 400);
            gradient.addColorStop(0, '#3A86C5');
            gradient.addColorStop(1, '#73B4E9');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 300, 400);

            // 添加装饰圆形
            ctx.beginPath();
            ctx.arc(250, 80, 60, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(50, 320, 40, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fill();

            // 添加文字
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 28px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(title, 150, 200);
            
            return canvas.toDataURL('image/jpeg', 0.9);
        }

        // 初始化
        function init() {
            renderCategories();
        }

        // 渲染分类
        function renderCategories(filterText = '') {
            const container = document.getElementById('categoriesContainer');
            
            // 过滤数据
            let filteredData = stageData;
            if (filterText) {
                const lowerFilter = filterText.toLowerCase();
                filteredData = stageData.map(category => ({
                    ...category,
                    songs: category.songs.filter(song => 
                        song.name.toLowerCase().includes(lowerFilter)
                    )
                })).filter(category => category.songs.length > 0);
            }
            
            // 检查是否有结果
            const totalSongs = filteredData.reduce((sum, cat) => sum + cat.songs.length, 0);
            if (totalSongs === 0) {
                container.innerHTML = '<div class="no-results">未找到匹配的歌曲</div>';
                return;
            }
            
            container.innerHTML = filteredData.map(category => `
                <div class="category-section" id="category-${category.id}">
                    <div class="category-header">
                        <h2 class="category-name">${category.name}</h2>
                        <span class="category-count">${category.songs.length} 首歌</span>
                    </div>
                    <div class="song-grid">
                        ${category.songs.map(song => {
                            const hasCustomCover = !!song.cover;
                            const coverSrc = song.cover || generateCover(song.name);
                            const coverText = hasCustomCover ? '' : `<div class="song-cover-text">${song.name}</div>`;
                            return `
                            <div class="song-card" onclick="openSongVideos('${category.id}', '${song.id}')">
                                <div class="song-cover">
                                    <img src="${coverSrc}" alt="${song.name}" loading="lazy" onerror="this.src='${generateCover(song.name)}'">
                                    ${coverText}
                                </div>
                                <div class="song-info">
                                    <div class="song-title">${song.name}</div>
                                    <div class="song-video-count">${song.videos.length} 个视频</div>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        // 搜索功能
        function searchSongs(query) {
            renderCategories(query);
            
            // 高亮并滚动到第一个结果
            if (query) {
                const firstCategory = document.querySelector('.category-section');
                if (firstCategory) {
                    firstCategory.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }
        }

        // 打开歌曲视频
        function openSongVideos(categoryId, songId) {
            const category = stageData.find(c => c.id === categoryId);
            const song = category.songs.find(s => s.id === songId);
            
            // 如果只有一个视频，直接弹窗播放
            if (song.videos.length === 1) {
                cardAlbum.playVideo(song.videos[0].videoUrl, song.videos[0].title);
                return;
            }
            
            // 如果有多个视频，显示选择弹窗
            const videoData = song.videos.map((video, i) => ({
                title: video.title,
                image: song.cover || generateCover(song.name),
                thumb: song.cover || generateCover(song.name),
                videoUrl: video.videoUrl,
                isLeaf: true
            }));
            
            // 使用 cardAlbum 打开弹窗
            cardAlbum.openVideoModal(song.name, videoData);
        }

        // 切换移动端菜单
        function toggleMobileMenu() {
            document.getElementById('navbarNav').classList.toggle('active');
        }

        // 回到顶部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 显示/隐藏回到顶部按钮
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            btn.classList.toggle('visible', window.scrollY > 500);
        });

        // 启动
        init();
    </script>
    <script src="js/music.js"></script>
</body>
</html>
