<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/city-page.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-family); background: var(--white); color: var(--text-primary); line-height: 1.6; }
        
        /* 页面头部 */
        .stage-header {
            background: url('images/stage/stage_header.webp') center/cover no-repeat;
            color: var(--white);
            padding: calc(var(--nav-height) + var(--space-3xl)) var(--space-lg) var(--space-3xl);
            text-align: center;
            position: relative;
            min-height: 350px;
        }
        .stage-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }
        .stage-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(to top, rgba(255, 255, 255, 1) 0%, transparent 100%);
            pointer-events: none;
            z-index: 2;
        }
        .stage-header > * {
            position: relative;
            z-index: 1;
        }
        .stage-title {
            font-size: var(--font-size-3xl);
            font-weight: 700;
            margin-bottom: var(--space-xl);
        }
        
        /* 搜索框 */
        .search-container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            margin-top: 80px;
        }
        .search-input {
            width: 100%;
            padding: var(--space-md) var(--space-xl);
            padding-left: 50px;
            font-size: var(--font-size-base);
            border: 2px solid #e0e0e0;
            border-radius: var(--radius-full);
            background: var(--white);
            color: var(--text-primary);
            outline: none;
            transition: all var(--transition-fast);
        }
        .search-input:focus {
            border-color: #999;
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.08);
        }
        .search-icon {
            position: absolute;
            left: var(--space-lg);
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: var(--font-size-lg);
        }
        
        /* 内容区域 */
        .content-section {
            padding: var(--space-3xl) var(--space-lg);
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 分类区域 */
        .category-section {
            margin-bottom: var(--space-3xl);
        }
        .category-header {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
            padding-bottom: var(--space-md);
            border-bottom: 2px solid var(--accent-light);
        }
        .category-name {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--primary);
        }
        .category-count {
            padding: var(--space-xs) var(--space-md);
            background: var(--accent-light);
            color: var(--primary);
            border-radius: var(--radius-full);
            font-size: var(--font-size-sm);
            font-weight: 600;
        }
        
        /* 歌曲卡册网格 */
        .song-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: var(--space-md);
        }
        
        /* 歌曲卡片 */
        .song-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
            cursor: pointer;
            border: 2px solid rgba(91, 164, 201, 0.2);
        }
        .song-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }
        .song-cover {
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .song-cover img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        .song-cover::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
            transition: all var(--transition-base);
        }
        .song-card:hover .song-cover::before {
            background: rgba(0, 0, 0, 0.1);
        }
        .song-cover-text {
            position: relative;
            z-index: 2;
            color: var(--white);
            font-size: var(--font-size-xl);
            font-weight: 700;
            text-align: center;
            padding: var(--space-md);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .song-info {
            padding: var(--space-sm) var(--space-xs);
            text-align: center;
        }
        .song-title {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 2px;
            font-size: var(--font-size-base);
            line-height: 1.3;
        }
        .song-video-count {
            font-size: var(--font-size-xs);
            color: var(--accent);
            line-height: 1.3;
        }
        
        /* 无结果提示 */
        .no-results {
            text-align: center;
            padding: var(--space-3xl);
            color: var(--text-secondary);
            font-size: var(--font-size-lg);
        }
        
        /* 响应式 */
        @media (max-width: 1400px) {
            .song-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        @media (max-width: 1200px) {
            .song-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        @media (max-width: 992px) {
            .song-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 768px) {
            .song-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .stage-title {
                font-size: var(--font-size-2xl);
            }
        }
        @media (max-width: 480px) {
            .song-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

        // 生成封面图
        function generateCover(title) {
            const canvas = document.createElement('canvas');
            canvas.width = 300;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');

            // 创建渐变背景
            const gradient = ctx.createLinearGradient(0, 0, 300, 400);
            gradient.addColorStop(0, '#3A86C5');
            gradient.addColorStop(1, '#73B4E9');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 300, 400);

            // 添加装饰圆形
            ctx.beginPath();
            ctx.arc(250, 80, 60, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(50, 320, 40, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fill();

            // 添加文字
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 28px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(title, 150, 200);
            
            return canvas.toDataURL('image/jpeg', 0.9);
        }

        // 初始化
        function init() {
            renderCategories();
        }

        // 渲染分类
        function renderCategories(filterText = '') {
            const container = document.getElementById('categoriesContainer');
            
            // 过滤数据
            let filteredData = stageData;
            if (filterText) {
                const lowerFilter = filterText.toLowerCase();
                filteredData = stageData.map(category => ({
                    ...category,
                    songs: category.songs.filter(song => 
                        song.name.toLowerCase().includes(lowerFilter)
                    )
                })).filter(category => category.songs.length > 0);
            }
            
            // 检查是否有结果
            const totalSongs = filteredData.reduce((sum, cat) => sum + cat.songs.length, 0);
            if (totalSongs === 0) {
                container.innerHTML = '<div class="no-results">未找到匹配的歌曲</div>';
                return;
            }
            
            container.innerHTML = filteredData.map(category => `
                <div class="category-section" id="category-${category.id}">
                    <div class="category-header">
                        <h2 class="category-name">${category.name}</h2>
                        <span class="category-count">${category.songs.length} 首歌</span>
                    </div>
                    <div class="song-grid">
                        ${category.songs.map(song => {
                            const hasCustomCover = !!song.cover;
                            const coverSrc = song.cover || generateCover(song.name);
                            const coverText = hasCustomCover ? '' : `<div class="song-cover-text">${song.name}</div>`;
                            return `
                            <div class="song-card" onclick="openSongVideos('${category.id}', '${song.id}')">
                                <div class="song-cover">
                                    <img src="${coverSrc}" alt="${song.name}" loading="lazy" onerror="this.src='${generateCover(song.name)}'">
                                    ${coverText}
                                </div>
                                <div class="song-info">
                                    <div class="song-title">${song.name}</div>
                                    <div class="song-video-count">${song.videos.length} 个视频</div>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        // 搜索功能
        function searchSongs(query) {
            renderCategories(query);
            
            // 高亮并滚动到第一个结果
            if (query) {
                const firstCategory = document.querySelector('.category-section');
                if (firstCategory) {
                    firstCategory.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }
        }

        // 打开歌曲视频
        function openSongVideos(categoryId, songId) {
            const category = stageData.find(c => c.id === categoryId);
            const song = category.songs.find(s => s.id === songId);
            
            // 如果只有一个视频，直接弹窗播放
            if (song.videos.length === 1) {
                cardAlbum.playVideo(song.videos[0].videoUrl, song.videos[0].title);
                return;
            }
            
            // 如果有多个视频，显示选择弹窗
            const videoData = song.videos.map((video, i) => ({
                title: video.title,
                image: song.cover || generateCover(song.name),
                thumb: song.cover || generateCover(song.name),
                videoUrl: video.videoUrl,
                isLeaf: true
            }));
            
            // 使用 cardAlbum 打开弹窗
            cardAlbum.openVideoModal(song.name, videoData);
        }

        // 切换移动端菜单
        function toggleMobileMenu() {
            document.getElementById('navbarNav').classList.toggle('active');
        }

        // 回到顶部

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            btn.classList.toggle('visible', window.scrollY > 500);
        });
