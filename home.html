<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鹭卓2025 RTTT巡演记录 - 首页</title>
    <link rel="stylesheet" href="css/variables.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: var(--font-family);
            background: var(--white);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: var(--nav-bg);
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }
        
        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 var(--space-lg);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .navbar-logo {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--white);
            text-decoration: none;
            letter-spacing: 1px;
        }
        
        .navbar-nav {
            display: flex;
            gap: var(--space-xs);
        }
        
        .nav-item {
            padding: var(--space-sm) var(--space-md);
            color: var(--white);
            text-decoration: none;
            font-size: var(--font-size-base);
            font-weight: 500;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            position: relative;
        }
        
        .nav-item:hover {
            color: var(--accent-light);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .nav-item.active {
            color: var(--white);
        }
        
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: var(--white);
            border-radius: var(--radius-full);
        }
        
        /* 汉堡菜单 */
        .navbar-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            padding: var(--space-sm);
            background: none;
            border: none;
            cursor: pointer;
        }
        
        .navbar-toggle span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--white);
            transition: all var(--transition-fast);
        }
        
        /* 主内容区 */
        .main-content {
            padding-top: var(--nav-height);
        }
        
        /* Banner区域 */
        .banner {
            position: relative;
            height: calc(100vh - var(--nav-height));
            min-height: 600px;
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--white) 50%, var(--accent-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 80%, rgba(66, 171, 243, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(66, 171, 243, 0.1) 0%, transparent 50%);
        }
        
        .banner-content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: var(--space-xl);
            max-width: 900px;
        }
        
        .banner-title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            color: var(--primary);
            margin-bottom: var(--space-md);
            letter-spacing: 3px;
        }
        
        .banner-subtitle {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--primary-light);
            margin-bottom: var(--space-xl);
            font-weight: 600;
        }
        
        .banner-desc {
            font-size: var(--font-size-lg);
            color: var(--text-secondary);
            line-height: 2;
            max-width: 700px;
            margin: 0 auto var(--space-2xl);
        }
        
        .banner-btn {
            display: inline-block;
            padding: var(--space-md) var(--space-2xl);
            background: var(--primary);
            color: var(--white);
            font-size: var(--font-size-lg);
            font-weight: 600;
            border-radius: var(--radius-full);
            text-decoration: none;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-md);
        }
        
        .banner-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        /* 城市线区域 */
        .city-line-section {
            padding: var(--space-3xl) var(--space-lg);
            background: var(--white);
        }
        
        .section-title {
            font-size: var(--font-size-3xl);
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin-bottom: var(--space-2xl);
        }
        
        .city-line-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }
        
        /* SVG城市线 */
        .city-line-svg {
            width: 100%;
            height: 400px;
        }
        
        .city-line-path {
            fill: none;
            stroke: var(--accent);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 8, 4;
            animation: dash 30s linear infinite;
        }
        
        @keyframes dash {
            to { stroke-dashoffset: -1000; }
        }
        
        .city-node {
            cursor: pointer;
        }

        .city-node-circle {
            fill: var(--primary);
            transition: all 0.3s ease;
        }

        .city-node:hover .city-node-circle {
            fill: var(--primary-light);
            r: 16;
        }

        .city-node.completed .city-node-circle {
            fill: var(--primary);
        }

        .city-node.completed:hover .city-node-circle {
            fill: var(--primary-light);
        }
        
        .city-label {
            font-size: 16px;
            font-weight: 600;
            fill: var(--primary);
            text-anchor: middle;
        }
        
        .city-date {
            font-size: 12px;
            fill: var(--text-secondary);
            text-anchor: middle;
        }
        
        /* 响应式城市线 */
        .city-line-mobile {
            display: none;
        }
        
        /* 页脚 */
        .footer {
            background: var(--primary);
            color: var(--white);
            padding: var(--space-2xl) var(--space-lg);
            text-align: center;
        }
        
        .footer-text {
            font-size: var(--font-size-base);
            opacity: 0.9;
        }
        
        /* 回到顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-md);
            z-index: 999;
            font-size: 20px;
        }
        
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }
        
        .back-to-top:hover {
            background: var(--primary-light);
            transform: translateY(-3px);
        }
        
        /* 响应式 */
        @media (max-width: 1024px) {
            .navbar-nav {
                position: fixed;
                top: var(--nav-height);
                left: 0;
                right: 0;
                background: var(--nav-bg);
                flex-direction: column;
                padding: var(--space-md);
                gap: var(--space-xs);
                transform: translateY(-100%);
                opacity: 0;
                visibility: hidden;
                transition: all var(--transition-base);
            }
            
            .navbar-nav.active {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }
            
            .navbar-toggle {
                display: flex;
            }
            
            .city-line-svg {
                display: none;
            }
            
            .city-line-mobile {
                display: block;
            }
            
            .mobile-city-list {
                display: flex;
                flex-direction: column;
                gap: var(--space-lg);
                max-width: 400px;
                margin: 0 auto;
            }
            
            .mobile-city-item {
                display: flex;
                align-items: center;
                gap: var(--space-md);
                padding: var(--space-lg);
                background: linear-gradient(135deg, var(--accent-light) 0%, var(--white) 100%);
                border-radius: var(--radius-lg);
                border-left: 4px solid var(--primary);
                cursor: pointer;
                transition: all var(--transition-base);
                text-decoration: none;
                color: inherit;
            }
            
            .mobile-city-item:hover {
                transform: translateX(10px);
                box-shadow: var(--shadow-md);
            }
            
            .mobile-city-dot {
                width: 16px;
                height: 16px;
                background: var(--primary);
                border-radius: 50%;
                flex-shrink: 0;
            }
            
            .mobile-city-info {
                flex: 1;
            }
            
            .mobile-city-name {
                font-size: var(--font-size-lg);
                font-weight: 700;
                color: var(--primary);
            }
            
            .mobile-city-date {
                font-size: var(--font-size-sm);
                color: var(--text-secondary);
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="home.html" class="navbar-logo">鹭卓2025RTTT巡演记录</a>
            <div class="navbar-nav" id="navbarNav">
                <a href="home.html" class="nav-item active">首页</a>
                <a href="chengdu.html" class="nav-item">成都站</a>
                <a href="hefei.html" class="nav-item">合肥站</a>
                <a href="taiyuan.html" class="nav-item">太原站</a>
                <a href="beijing.html" class="nav-item">北京站</a>
                <a href="nanjing.html" class="nav-item">南京站</a>
                <a href="stage.html" class="nav-item">舞台直拍</a>
            </div>
            <button class="navbar-toggle" id="navbarToggle" onclick="toggleMobileMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- Banner -->
        <section class="banner">
            <div class="banner-content">
                <h1 class="banner-title">鹭卓2025 RTTT巡演</h1>
                <p class="banner-subtitle">Ready To The Top</p>
                <p class="banner-desc">
                    鹭卓2025「RTTT」全国巡回演唱会，以"Run To The Top"为主题，寓意着不断奔跑、勇攀高峰的音乐之旅。
                    本次巡演将走过成都、合肥、太原、北京、南京五座城市，为歌迷带来震撼的视听盛宴。
                </p>
                <a href="#city-line" class="banner-btn">探索巡演路线</a>
            </div>
        </section>

        <!-- 城市线 -->
        <section class="city-line-section" id="city-line">
            <h2 class="section-title">巡演路线</h2>
            <div class="city-line-container">
                <!-- SVG城市线 (桌面端) -->
                <svg class="city-line-svg" viewBox="0 0 1000 400">
                    <!-- 定义箭头标记 -->
                    <defs>
                        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="var(--primary-light)" />
                        </marker>
                    </defs>
                    
                    <!-- 手绘风格曲线路径 -->
                    <path class="city-line-path" 
                          d="M 100,200 
                             Q 200,150 250,180 
                             T 400,160 
                             Q 500,140 550,200 
                             T 700,180 
                             Q 800,160 850,200 
                             T 950,180"
                          marker-end="url(#arrowhead)"/>
                    
                    <!-- 成都 -->
                    <g class="city-node completed" onclick="goToCity('chengdu')">
                        <circle class="city-node-circle" cx="100" cy="200" r="12"/>
                        <text class="city-label" x="100" y="240">成都</text>
                        <text class="city-date" x="100" y="258">4月12-13日</text>
                    </g>
                    
                    <!-- 合肥 -->
                    <g class="city-node" onclick="goToCity('hefei')">
                        <circle class="city-node-circle" cx="300" cy="170" r="12"/>
                        <text class="city-label" x="300" y="210">合肥</text>
                        <text class="city-date" x="300" y="228">待定</text>
                    </g>
                    
                    <!-- 太原 -->
                    <g class="city-node" onclick="goToCity('taiyuan')">
                        <circle class="city-node-circle" cx="500" cy="200" r="12"/>
                        <text class="city-label" x="500" y="240">太原</text>
                        <text class="city-date" x="500" y="258">待定</text>
                    </g>
                    
                    <!-- 北京 -->
                    <g class="city-node" onclick="goToCity('beijing')">
                        <circle class="city-node-circle" cx="700" cy="180" r="12"/>
                        <text class="city-label" x="700" y="220">北京</text>
                        <text class="city-date" x="700" y="238">待定</text>
                    </g>
                    
                    <!-- 南京 -->
                    <g class="city-node" onclick="goToCity('nanjing')">
                        <circle class="city-node-circle" cx="900" cy="180" r="12"/>
                        <text class="city-label" x="900" y="220">南京</text>
                        <text class="city-date" x="900" y="238">待定</text>
                    </g>
                </svg>
                
                <!-- 移动端城市列表 -->
                <div class="city-line-mobile">
                    <div class="mobile-city-list">
                        <a href="chengdu.html" class="mobile-city-item">
                            <div class="mobile-city-dot"></div>
                            <div class="mobile-city-info">
                                <div class="mobile-city-name">成都站</div>
                                <div class="mobile-city-date">4月12-13日</div>
                            </div>
                        </a>
                        <a href="hefei.html" class="mobile-city-item">
                            <div class="mobile-city-dot"></div>
                            <div class="mobile-city-info">
                                <div class="mobile-city-name">合肥站</div>
                                <div class="mobile-city-date">待定</div>
                            </div>
                        </a>
                        <a href="taiyuan.html" class="mobile-city-item">
                            <div class="mobile-city-dot"></div>
                            <div class="mobile-city-info">
                                <div class="mobile-city-name">太原站</div>
                                <div class="mobile-city-date">待定</div>
                            </div>
                        </a>
                        <a href="beijing.html" class="mobile-city-item">
                            <div class="mobile-city-dot"></div>
                            <div class="mobile-city-info">
                                <div class="mobile-city-name">北京站</div>
                                <div class="mobile-city-date">待定</div>
                            </div>
                        </a>
                        <a href="nanjing.html" class="mobile-city-item">
                            <div class="mobile-city-dot"></div>
                            <div class="mobile-city-info">
                                <div class="mobile-city-name">南京站</div>
                                <div class="mobile-city-date">待定</div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p class="footer-text">鹭卓2025 RTTT巡演记录 | For Luzhou，From 橘子suuoia_Lu</p>
    </footer>

    <!-- 回到顶部 -->
    <div class="back-to-top" id="backToTop" onclick="scrollToTop()">↑</div>

    <script>
        // 切换移动端菜单
        function toggleMobileMenu() {
            document.getElementById('navbarNav').classList.toggle('active');
        }
        
        // 跳转到城市页面
        function goToCity(city) {
            window.location.href = city + '.html';
        }
        
        // 回到顶部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 显示/隐藏回到顶部按钮
        window.addEventListener('scroll', () => {
            const backToTop = document.getElementById('backToTop');
            if (window.scrollY > 500) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        });
        
        // 点击导航项后关闭移动端菜单
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.getElementById('navbarNav').classList.remove('active');
            });
        });
    </script>
    <script src="js/music.js"></script>
</body>
</html>
