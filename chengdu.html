                            { title: '舞台照2', image: 'assets/images/chengdu/day2-2.jpg', thumb: 'assets/images/chengdu/day2-2-thumb.jpg', isLeaf: true },
                            { title: '舞台照3', image: 'assets/images/chengdu/day2-3.jpg', thumb: 'assets/images/chengdu/day2-3-thumb.jpg', isLeaf: true }
                        ]
                    },
                    {
                        title: '造型B',
                        cover: 'assets/images/day2-style2.jpg',
                        children: [
                            { title: '舞台照1', image: 'assets/images/chengdu/day2-4.jpg', thumb: 'assets/images/chengdu/day2-4-thumb.jpg', isLeaf: true },
                            { title: '舞台照2', image: 'assets/images/chengdu/day2-5.jpg', thumb: 'assets/images/chengdu/day2-5-thumb.jpg', isLeaf: true }
                        ]
                    }
                ]
            }
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化视频播放器
            initVideoPlayer();
            
            // 初始化回到顶部
            initBackToTop();
        });
        
        // 初始化视频播放器
        function initVideoPlayer() {
            const videoContainer = document.getElementById('documentaryVideo');
            if (videoContainer && typeof createVideoPlayer === 'function') {
                createVideoPlayer('documentaryVideo', {
                    src: 'http://t.cn/AXwkunbo',
                    poster: 'assets/images/chengdu/doc-poster.jpg',
                    title: '成都站纪录片'
                });
            }
        }
        
        // 初始化回到顶部
        function initBackToTop() {
            const backToTop = document.getElementById('backToTop');
            if (!backToTop) return;
            
            window.addEventListener('scroll', function() {
                if (window.scrollY > 500) {
                    backToTop.classList.add('visible');
                } else {
                    backToTop.classList.remove('visible');
                }
            });
        }
        
        // 切换移动端菜单
        function toggleMobileMenu() {
            const navbarNav = document.getElementById('navbarNav');
            navbarNav?.classList.toggle('active');
        }
        
        // 回到顶部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 打开合照区弹窗
        function openGroupPhotoModal() {
            cardAlbum.openNavModal('合照区', navData.groupPhoto);
        }
        
        // 打开花束区弹窗
        function openBouquetModal() {
            cardAlbum.openNavModal('花束区', navData.bouquet);
        }
        
        // 打开官摄区弹窗（三层级）
        function openOfficialModal() {
            cardAlbum.openModal('官摄区', navData.official, 0);
        }
        
        // 打开海报区弹窗
        function openPosterNavModal() {
            cardAlbum.openNavModal('海报信封区', navData.poster);
        }
        
        // 播放视频
        function playVideo(videoUrl, title) {
            const modal = document.createElement('div');
            modal.className = 'video-modal';
            
            // 判断视频平台类型
            let iframeHtml;
            if (videoUrl.includes('xiaohongshu.com')) {
                // 小红书视频嵌入
                iframeHtml = `<iframe src="${videoUrl}?fullscreen=true" 
                    frameborder="0" 
                    scrolling="no" 
                    allowfullscreen
                    style="width:100%;height:100%;position:absolute;top:0;left:0;">
                </iframe>`;
            } else if (videoUrl.includes('weibo.com')) {
                // 微博视频嵌入
                iframeHtml = `<iframe src="${videoUrl}" 
                    frameborder="0" 
                    scrolling="no" 
                    allowfullscreen>
                </iframe>`;
            } else {
                // 默认视频嵌入
                iframeHtml = `<iframe src="${videoUrl}" 
                    frameborder="0" 
                    scrolling="no" 
                    allowfullscreen>
                </iframe>`;
            }
            
            modal.innerHTML = `
                <div class="video-modal-overlay" onclick="closeVideoModal()"></div>
                <div class="video-modal-content">
                    <button class="video-modal-close" onclick="closeVideoModal()">×</button>
                    <h3 class="video-modal-title">${title}</h3>
                    <div class="video-iframe-container">
                        ${iframeHtml}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';
        }
        
        // 关闭视频弹窗
        function closeVideoModal() {
            const modal = document.querySelector('.video-modal');
            if (modal) {
                modal.remove();
                document.body.style.overflow = '';
            }
        }
        
        // 打开纪录片弹窗
        function openDocumentaryModal() {
            playVideo('https://weibo.com/tv/show/1034:5226437192646763?from=old_pc_videoshow', '成都站纪录片');
        }
        
        // 打开直拍区弹窗
        function openFancamModal(day) {
            if (day === 'day1') {
                cardAlbum.openModal('Day 1 直拍', fancamData[0].children, 0);
            } else {
                cardAlbum.openModal('Day 2 直拍', fancamData[1].children, 0);
            }
        }
        
        // 打开海报花絮弹窗
        function openPosterModal() {
            cardAlbum.openNavModal('花絮', posterData);
        }
        
        // 打开定妆照弹窗
        function openStylingModal() {
            cardAlbum.openModal('定妆照', stylingData, 0);
        }
        
        // 打开图集区弹窗
        function openGalleryModal(type) {
            let data;
            let title;
            
            switch(type) {
                case 'day1':
                    title = 'Day 1 图集';
                    data = galleryData[0].children;
                    break;
                case 'day2':
                    title = 'Day 2 图集';
                    data = galleryData[1].children;
                    break;
            }
            
            cardAlbum.openModal(title, data, 0);
        }
        
        // 点击导航项后关闭移动端菜单
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.getElementById('navbarNav')?.classList.remove('active');
            });
        });
    </script>
    <script src="js/music.js"></script>
</body>
</html>
